<!doctype html>
<html>
<head>
<base target="_top" />
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
/* ---------------------------------------------------------
   Tokens — alineats amb el brandbook UAUU (pressupostos/colors_and_type.css)
   --------------------------------------------------------- */
:root {
  /* Blacks / neutrals */
  --color-ink:      #1c1c1a;
  --color-charcoal: #333333;
  --color-body:     #515856;
  --color-muted:    #7e8c8d;

  /* Warm neutrals (accent) */
  --color-sand:       #cdc4b1;
  --color-sand-dark:  #a99c81;
  --color-sand-light: #e8e2d8;
  --color-sand-pale:  #f5f2ed;

  /* Structure */
  --color-divider:  #e7e4de;
  --color-surface:  #faf9f6;
  --color-white:    #ffffff;

  /* State */
  --color-danger:      #a5433a;
  --color-danger-bg:   #f6e9e7;
  --color-success:     #4f6f52;
  --color-success-bg:  #ecf1ea;

  /* Semantic */
  --fg-primary:   var(--color-ink);
  --fg-secondary: var(--color-body);
  --fg-tertiary:  var(--color-muted);
  --fg-inverse:   var(--color-white);

  --bg-page:    var(--color-white);
  --bg-surface: var(--color-surface);
  --bg-warm:    var(--color-sand-pale);

  --border-default: var(--color-divider);
  --focus-ring:      var(--color-charcoal);

  --action-primary-bg:       var(--color-charcoal);
  --action-primary-hover-bg: #474747;
  --action-primary-fg:       var(--color-white);

  /* Type */
  --font-display: 'Cormorant Garamond', 'Georgia', serif;
  --font-ui:      'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;

  --text-xs:   0.75rem;
  --text-sm:   0.8125rem;
  --text-base: 0.875rem;
  --text-md:   0.9375rem;
  --text-lg:   1.0625rem;
  --text-display: 1.625rem;

  /* Space */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;

  /* Shape */
  --radius-sm: 6px;
  --radius-md: 8px;
  --radius-pill: 999px;

  --shadow-sm: 0 1px 2px rgba(28, 28, 26, 0.06), 0 1px 1px rgba(28, 28, 26, 0.04);

  --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
  --duration: 160ms;
}

* { box-sizing: border-box; }

/* Sense això, classes com .btn (display: inline-flex) guanyarien a
   l'estil per defecte del navegador per a [hidden] (mateixa especificitat,
   però l'autor sempre guanya al full d'estils UA) i l'element es veuria
   igualment encara que JS li posi hidden = true. */
[hidden] { display: none !important; }

body {
  margin: 0;
  font-family: var(--font-ui);
  font-size: var(--text-base);
  color: var(--fg-primary);
  background: var(--bg-page);
  -webkit-font-smoothing: antialiased;
}

button, input {
  font-family: inherit;
  font-size: inherit;
  color: inherit;
}
/* ---------------------------------------------------------
   Topbar
   --------------------------------------------------------- */
.topbar {
  display: flex;
  align-items: baseline;
  gap: var(--space-3);
  padding: var(--space-4) var(--space-6);
  background: var(--bg-page);
  border-bottom: 1px solid var(--border-default);
}

.wordmark {
  font-family: var(--font-display);
  font-weight: 500;
  font-style: italic;
  font-size: var(--text-display);
  letter-spacing: -0.01em;
  margin: 0;
  color: var(--fg-primary);
}

.eyebrow {
  font-family: var(--font-ui);
  font-weight: 600;
  font-size: var(--text-xs);
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--fg-tertiary);
}

/* ---------------------------------------------------------
   Layout
   --------------------------------------------------------- */
.app {
  max-width: 1400px;
  margin: 0 auto;
  padding: var(--space-6);
}

/* ---------------------------------------------------------
   Tabs — underline style
   --------------------------------------------------------- */
.tabs {
  display: flex;
  gap: var(--space-5);
  margin-bottom: var(--space-5);
  border-bottom: 1px solid var(--border-default);
}

.tab-btn {
  position: relative;
  border: none;
  background: none;
  padding: var(--space-2) var(--space-1) var(--space-3);
  cursor: pointer;
  font-size: var(--text-md);
  font-weight: 500;
  color: var(--fg-tertiary);
  transition: color var(--duration) var(--ease-out);
}

.tab-btn::after {
  content: '';
  position: absolute;
  left: 0;
  right: 0;
  bottom: -1px;
  height: 2px;
  background: var(--color-ink);
  transform: scaleX(0);
  transform-origin: center;
  transition: transform var(--duration) var(--ease-out);
}

.tab-btn:hover { color: var(--fg-primary); }
.tab-btn.active { color: var(--fg-primary); }
.tab-btn.active::after { transform: scaleX(1); }

.tab-btn:focus-visible {
  outline: 2px solid var(--focus-ring);
  outline-offset: 2px;
  border-radius: var(--radius-sm);
}

@media (prefers-reduced-motion: reduce) {
  .tab-btn::after { transition: none; }
}
/* ---------------------------------------------------------
   Toolbar
   --------------------------------------------------------- */
.toolbar {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  margin-bottom: var(--space-4);
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  border: 1px solid var(--border-default);
  background: var(--bg-page);
  color: var(--fg-primary);
  padding: var(--space-2) var(--space-3);
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: var(--text-sm);
  font-weight: 500;
  transition: background var(--duration) var(--ease-out), border-color var(--duration) var(--ease-out);
}

.btn svg { flex-shrink: 0; }

.btn:hover { background: var(--bg-surface); border-color: var(--color-sand-dark); }
.btn:active { background: var(--color-sand-light); }

.btn:focus-visible {
  outline: 2px solid var(--focus-ring);
  outline-offset: 2px;
}

.btn-primary {
  background: var(--action-primary-bg);
  border-color: var(--action-primary-bg);
  color: var(--action-primary-fg);
}
.btn-primary:hover { background: var(--action-primary-hover-bg); border-color: var(--action-primary-hover-bg); }
.btn-primary:active { background: var(--color-ink); }

.btn-ghost {
  background: transparent;
  border-color: transparent;
  color: var(--fg-secondary);
}
.btn-ghost:hover { background: var(--bg-surface); }

.toolbar-spacer { flex: 1; }

.table-filters {
  display: flex;
  align-items: center;
  gap: var(--space-2);
}
.table-filters[hidden] { display: none; }

.table-filters .table-filter { width: 150px; }

.sheet-hint {
  margin: calc(var(--space-5) * -1 + var(--space-1)) 0 var(--space-4);
  font-size: var(--text-sm);
  color: var(--fg-tertiary);
}

.search-field {
  position: relative;
  display: flex;
  align-items: center;
}

.search-field svg {
  position: absolute;
  left: var(--space-2);
  top: 50%;
  transform: translateY(-50%);
  color: var(--fg-tertiary);
  pointer-events: none;
}

.search-input {
  border: 1px solid var(--border-default);
  background: var(--bg-page);
  border-radius: var(--radius-sm);
  padding: var(--space-2) var(--space-2) var(--space-2) 30px;
  font-size: var(--text-sm);
  width: 220px;
  transition: border-color var(--duration) var(--ease-out), background var(--duration) var(--ease-out);
}
.search-input::placeholder { color: var(--fg-tertiary); }
.search-input:hover { border-color: var(--color-sand-dark); }
.search-input:focus {
  outline: none;
  border-color: var(--focus-ring);
  background: var(--bg-page);
}

/* ---------------------------------------------------------
   Status indicator
   --------------------------------------------------------- */
.status {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  font-size: var(--text-sm);
  color: var(--fg-tertiary);
  min-height: 1.25rem;
}

.status.is-loading .status-dot {
  width: 8px; height: 8px; border-radius: 50%;
  border: 1.5px solid var(--color-sand-dark);
  border-top-color: transparent;
  animation: spin 700ms linear infinite;
}

.status.is-success { color: var(--color-success); }
.status.is-success .status-dot::before { content: '✓'; font-size: 0.85em; }

.status.is-error { color: var(--color-danger); font-weight: 500; }
.status.is-error .status-dot::before { content: '!'; font-size: 0.8em; font-weight: 700; }

@keyframes spin { to { transform: rotate(360deg); } }
@media (prefers-reduced-motion: reduce) {
  .status.is-loading .status-dot { animation: none; border-top-color: var(--color-sand-dark); }
}
/* ---------------------------------------------------------
   Table
   --------------------------------------------------------- */
.table-wrap {
  overflow: auto;
  background: var(--bg-page);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-md);
  max-height: calc(100vh - 220px);
}

table { border-collapse: collapse; width: 100%; font-size: var(--text-base); }

th, td {
  border-bottom: 1px solid var(--border-default);
  border-right: 1px solid var(--border-default);
  padding: 0;
  min-width: 150px;
}
th:last-child, td:last-child { border-right: none; }

thead th {
  background: var(--bg-surface);
  position: sticky;
  top: 0;
  z-index: 1;
  text-align: left;
}

.header-cell {
  padding: var(--space-3) var(--space-2);
  font-weight: 600;
  font-size: var(--text-sm);
}

.icon-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 26px;
  height: 26px;
  border: none;
  background: transparent;
  color: var(--fg-tertiary);
  cursor: pointer;
  border-radius: var(--radius-sm);
  opacity: 0.55;
  transition: opacity var(--duration) var(--ease-out), background var(--duration) var(--ease-out), color var(--duration) var(--ease-out);
}
tr:hover .icon-btn,
.icon-btn:focus-visible { opacity: 1; }
.icon-btn:hover { color: var(--color-danger); background: var(--color-danger-bg); opacity: 1; }
.icon-btn:focus-visible { outline: 2px solid var(--focus-ring); outline-offset: 1px; }

.cell-input {
  width: 100%;
  border: none;
  background: transparent;
  padding: var(--space-3) var(--space-3);
  font-size: var(--text-base);
  color: var(--fg-primary);
  border-radius: var(--radius-sm);
}
tr:hover .cell-input { background: var(--bg-surface); }
.cell-input:focus {
  outline: none;
  box-shadow: inset 0 0 0 2px var(--focus-ring);
  background: var(--bg-page);
  position: relative;
  z-index: 1;
}
.cell-input.dirty { background: var(--bg-warm); }
tr:hover .cell-input.dirty { background: var(--color-sand-light); }

.cell-input-readonly {
  color: var(--fg-tertiary);
  cursor: default;
}
.cell-input-readonly:focus { box-shadow: none; }

.row-actions-col { width: 44px; min-width: 44px; }
td.row-actions-col, th.row-actions-col { text-align: center; }
td.row-actions-col { padding: 0 var(--space-2); }

/* ---------------------------------------------------------
   Empty & skeleton states
   --------------------------------------------------------- */
.empty-row td {
  padding: var(--space-6);
  text-align: center;
  color: var(--fg-tertiary);
  font-size: var(--text-md);
  border-right: none;
}

.skeleton-cell {
  height: 1rem;
  margin: var(--space-3);
  border-radius: var(--radius-sm);
  background: linear-gradient(90deg, var(--bg-surface) 25%, var(--color-divider) 37%, var(--bg-surface) 63%);
  background-size: 400% 100%;
  animation: shimmer 1.4s ease infinite;
}
@keyframes shimmer {
  0% { background-position: 100% 50%; }
  100% { background-position: 0 50%; }
}
@media (prefers-reduced-motion: reduce) {
  .skeleton-cell { animation: none; background: var(--bg-surface); }
}
/* ---------------------------------------------------------
   Modal — formulari de nova fila
   --------------------------------------------------------- */
.modal {
  border: none;
  border-radius: var(--radius-md);
  padding: 0;
  width: min(480px, calc(100vw - var(--space-6) * 2));
  box-shadow: 0 12px 32px rgba(28, 28, 26, 0.18);
  transition: width var(--duration) var(--ease-out);
}

.modal.modal-wide {
  width: min(720px, calc(100vw - var(--space-6) * 2));
}

.modal::backdrop {
  background: rgba(28, 28, 26, 0.35);
}

.modal-header {
  padding: var(--space-5) var(--space-6) var(--space-4);
  border-bottom: 1px solid var(--border-default);
}

.modal-title {
  margin: 0;
  font-family: var(--font-display);
  font-weight: 500;
  font-style: italic;
  font-size: var(--text-display);
  color: var(--fg-primary);
}

.modal-step {
  margin: var(--space-1) 0 0;
  font-size: var(--text-sm);
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--fg-tertiary);
}
.modal-step:empty { display: none; }

.modal-progress {
  margin-top: var(--space-3);
  height: 3px;
  border-radius: var(--radius-pill);
  background: var(--color-divider);
  overflow: hidden;
}

.modal-progress-fill {
  height: 100%;
  background: var(--color-charcoal);
  border-radius: var(--radius-pill);
  transition: width 220ms var(--ease-out);
}

.modal-fields {
  display: flex;
  flex-direction: column;
  gap: var(--space-4);
  padding: var(--space-5) var(--space-6);
  max-height: 60vh;
  overflow-y: auto;
}

.modal-fields.is-entering {
  animation: modalFieldsIn 200ms var(--ease-out);
}
@keyframes modalFieldsIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: none; }
}
@media (prefers-reduced-motion: reduce) {
  .modal-fields.is-entering { animation: none; }
}

.modal-field label {
  display: block;
  font-size: var(--text-sm);
  font-weight: 600;
  color: var(--fg-secondary);
  margin-bottom: var(--space-2);
}

.modal-field-required { color: var(--color-danger); }

.modal-field-error {
  display: none;
  margin: var(--space-1) 0 0;
  font-size: var(--text-xs);
  color: var(--color-danger);
}
.modal-field.is-invalid .modal-field-error { display: block; }

.modal-field.is-invalid input,
.modal-field.is-invalid .multiselect-trigger {
  border-color: var(--color-danger);
}
.modal-field.is-invalid .currency-suffix { color: var(--color-danger); }

.modal-field input {
  width: 100%;
  border: 1px solid var(--border-default);
  border-radius: var(--radius-sm);
  padding: var(--space-2) var(--space-3);
  font-size: var(--text-base);
  color: var(--fg-primary);
  background: var(--bg-page);
}

.modal-field input:hover { border-color: var(--color-sand-dark); }
.modal-field input:focus {
  outline: none;
  border-color: var(--focus-ring);
  box-shadow: inset 0 0 0 1px var(--focus-ring);
}

.modal-field-readonly input {
  background: var(--bg-surface);
  color: var(--fg-tertiary);
  cursor: default;
}
.modal-field-readonly input:hover { border-color: var(--border-default); }
.modal-field-readonly input:focus { box-shadow: none; }

/* ---------------------------------------------------------
   Multiselecció (p.ex. camp "Masia")
   --------------------------------------------------------- */
.multiselect {
  position: relative;
}

.multiselect-trigger {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--space-2);
  width: 100%;
  text-align: left;
  border: 1px solid var(--border-default);
  border-radius: var(--radius-sm);
  padding: var(--space-2) var(--space-3);
  font-size: var(--text-base);
  color: var(--fg-primary);
  background: var(--bg-page);
  cursor: pointer;
}
.multiselect-trigger-label {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.multiselect-trigger-chevron {
  flex-shrink: 0;
  display: inline-flex;
  color: var(--fg-tertiary);
  transition: transform var(--duration) var(--ease-out);
}
.multiselect-trigger.is-open .multiselect-trigger-chevron { transform: rotate(180deg); }
.multiselect-trigger:hover { border-color: var(--color-sand-dark); }
.multiselect-trigger:focus-visible {
  outline: none;
  border-color: var(--focus-ring);
  box-shadow: inset 0 0 0 1px var(--focus-ring);
}
.multiselect-trigger:disabled {
  color: var(--fg-tertiary);
  cursor: default;
  background: var(--bg-surface);
}
.multiselect-trigger:disabled .multiselect-trigger-chevron { display: none; }

/* position:fixed (coordenades calculades en JS a l'obrir) en lloc
   d'"absolute": si no, quedaria tallat pel scroll de .modal-fields. */
.multiselect-panel {
  position: fixed;
  z-index: 30;
  max-height: 200px;
  overflow-y: auto;
  background: var(--bg-page);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-sm);
  box-shadow: var(--shadow-sm);
  padding: var(--space-2);
}

.multiselect-option {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  padding: var(--space-2) var(--space-3);
  border-radius: var(--radius-sm);
  font-size: var(--text-sm);
  cursor: pointer;
}
.multiselect-option:hover { background: var(--bg-surface); }
.multiselect-option.is-selected { background: var(--bg-warm); font-weight: 500; }
.multiselect-option.is-selected:hover { background: var(--color-sand-light); }

/* El checkbox real es manté per a teclat/lectors de pantalla, però
   es clica el nom (tota la fila), no una casella visible. */
.multiselect-option-input {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}
.multiselect-option-input:focus-visible ~ .multiselect-option-text {
  outline: 2px solid var(--focus-ring);
  outline-offset: 2px;
  border-radius: var(--radius-sm);
}

.multiselect-option-text { flex: 1; }

.multiselect-option-check {
  display: inline-flex;
  flex-shrink: 0;
  color: var(--fg-primary);
  visibility: hidden;
}
.multiselect-option.is-selected .multiselect-option-check { visibility: visible; }

/* ---------------------------------------------------------
   Camp de moneda
   --------------------------------------------------------- */
.currency-field {
  position: relative;
  display: flex;
  align-items: center;
}

.currency-field input {
  padding-right: calc(var(--space-3) + 1.25em);
}

.currency-suffix {
  position: absolute;
  right: var(--space-3);
  color: var(--fg-tertiary);
  pointer-events: none;
}

/* ---------------------------------------------------------
   Camp de casella de verificació
   --------------------------------------------------------- */
.checkbox-field {
  display: flex;
  align-items: center;
}

.checkbox-field input {
  width: 18px;
  height: 18px;
  cursor: pointer;
  accent-color: var(--color-charcoal);
}

/* ---------------------------------------------------------
   Targetes clicables (pas "Opcions")
   --------------------------------------------------------- */
.option-card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: var(--space-3);
}

.option-card {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  min-height: 84px;
  padding: var(--space-4) var(--space-3);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-md);
  background: var(--bg-page);
  color: var(--fg-secondary);
  font-size: var(--text-sm);
  font-weight: 500;
  cursor: pointer;
  transition: border-color var(--duration) var(--ease-out), background var(--duration) var(--ease-out), color var(--duration) var(--ease-out);
}
.option-card:hover { border-color: var(--color-sand-dark); background: var(--bg-surface); }
.option-card.is-selected {
  border-color: var(--color-charcoal);
  background: var(--bg-warm);
  color: var(--fg-primary);
}
.option-card.is-selected:hover { background: var(--color-sand-light); }
.option-card:has(.option-card-input:focus-visible) {
  outline: 2px solid var(--focus-ring);
  outline-offset: 2px;
}

.option-card-input {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}

.option-card-text { padding-right: var(--space-2); }

.option-card-check {
  position: absolute;
  top: var(--space-2);
  right: var(--space-2);
  color: var(--color-charcoal);
  visibility: hidden;
}
.option-card.is-selected .option-card-check { visibility: visible; }

/* ---------------------------------------------------------
   Pas de desglossament (Desplegable / Llindà / Altres Extres)
   --------------------------------------------------------- */
.breakdown-section {
  padding: var(--space-4) 0;
  border-top: 1px solid var(--border-default);
}
.breakdown-section:first-child {
  padding-top: 0;
  border-top: none;
}

.section-heading {
  margin: 0 0 var(--space-3);
  font-size: var(--text-md);
  font-weight: 600;
  color: var(--fg-primary);
}

.modal-fields-nested {
  padding: 0;
  max-height: none;
  overflow: visible;
}

.switch-options-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: var(--space-5);
}

.switch-option-group {
  margin-bottom: var(--space-4);
  min-width: 0;
}
.switch-option-group:last-child { margin-bottom: 0; }

.switch-fields-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--space-3);
}

.switch-option-heading {
  margin: 0 0 var(--space-2);
  font-size: var(--text-sm);
  font-weight: 600;
  color: var(--fg-secondary);
}

.desplegable-table {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: var(--space-3);
  font-size: var(--text-sm);
}
.desplegable-table td {
  border-bottom: 1px solid var(--border-default);
  padding: var(--space-2);
}
.desplegable-table td:last-child { width: 32px; text-align: center; }

.desplegable-empty {
  color: var(--fg-tertiary);
  text-align: center;
  padding: var(--space-3) !important;
}

.desplegable-form {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr 0.8fr auto;
  gap: var(--space-2);
  align-items: center;
}

.desplegable-form input {
  border: 1px solid var(--border-default);
  border-radius: var(--radius-sm);
  padding: var(--space-2) var(--space-3);
  font-size: var(--text-sm);
  width: 100%;
}
.desplegable-form input:hover { border-color: var(--color-sand-dark); }
.desplegable-form input:focus {
  outline: none;
  border-color: var(--focus-ring);
  box-shadow: inset 0 0 0 1px var(--focus-ring);
}

.desplegable-form .btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  background: var(--action-primary-bg);
  border-color: var(--action-primary-bg);
}

@media (max-width: 640px) {
  .desplegable-form { grid-template-columns: 1fr 1fr; }
}

.modal-actions {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: var(--space-2);
  padding: var(--space-4) var(--space-6) var(--space-5);
  border-top: 1px solid var(--border-default);
}

.modal-actions-spacer { flex: 1; }
</style>
</head>
<body>
<header class="topbar">
  <h1 class="wordmark">BBDD Preus</h1>
  <span class="eyebrow">UAUU</span>
</header>

<main class="app">
  <nav id="tabs" class="tabs" aria-label="Pestanyes del full"></nav>
  <p id="sheetHint" class="sheet-hint"></p>

  <div class="toolbar">
    <label class="search-field">
      <span id="searchIcon"></span>
      <input id="searchInput" class="search-input" type="search" placeholder="Cerca..." aria-label="Cerca dins d'aquest full" />
    </label>
    <div id="tableFilters" class="table-filters"></div>
    <span class="toolbar-spacer"></span>
    <span id="statusMsg" class="status" role="status" aria-live="polite"></span>
    <button id="addRowBtn" class="btn btn-primary" type="button"></button>
    <button id="refreshBtn" class="btn btn-ghost" type="button" aria-label="Refresca"></button>
  </div>

  <div class="table-wrap">
    <table id="dataTable"></table>
  </div>
</main>

<dialog id="addRowModal" class="modal">
  <form id="addRowForm" method="dialog">
    <div class="modal-header">
      <h2 id="addRowTitle" class="modal-title">Nova fila</h2>
      <p id="addRowStep" class="modal-step"></p>
      <div class="modal-progress" aria-hidden="true">
        <div id="addRowProgressFill" class="modal-progress-fill"></div>
      </div>
    </div>
    <div id="addRowFields" class="modal-fields"></div>
    <div class="modal-actions">
      <button type="button" id="addRowCancelBtn" class="btn btn-ghost">Cancel·la</button>
      <span class="modal-actions-spacer"></span>
      <button type="button" id="addRowBackBtn" class="btn btn-ghost" hidden>Enrere</button>
      <button type="button" id="addRowNextBtn" class="btn btn-primary" hidden>Següent</button>
      <button type="submit" id="addRowSubmitBtn" class="btn btn-primary" hidden>Crea la fila</button>
    </div>
  </form>
</dialog>

  <script>
const ICONS = {
  trash: '<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2.5 4.25h11M5.5 4.25V2.75a1 1 0 0 1 1-1h3a1 1 0 0 1 1 1v1.5m2 0-.62 8.66a1 1 0 0 1-1 .93H5.12a1 1 0 0 1-1-.93L3.5 4.25"/><path d="M6.5 7.25v4M9.5 7.25v4"/></svg>',
  plus: '<svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M8 2.5v11M2.5 8h11"/></svg>',
  refresh: '<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M13.5 8a5.5 5.5 0 1 1-1.62-3.9M13.5 2.3v3.3h-3.3"/></svg>',
  search: '<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="7" cy="7" r="4.5"/><path d="M13.5 13.5 10.5 10.5"/></svg>',
  chevron: '<svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6.25 8 10l4-3.75"/></svg>',
  check: '<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3.5 8.5 6.5 11.5 12.5 4.5"/></svg>',
};
// Nom de la columna d'identificador autogenerat (mateixa lògica que
// isIdHeader_ a Código.js: es compara ignorant majúscules/minúscules).
// No s'ofereix mai com a editable.
const ID_HEADER = 'id';
function isIdHeader(header) {
  return String(header == null ? '' : header).trim().toLowerCase() === ID_HEADER;
}

/* Etiquetes i explicacions llegibles per a cada pestanya del Sheet.
   Els noms de full (claus) no es toquen — només com es mostren aquí.
   Si un full no hi surt (o li canvies el nom a Google Sheets), es mostra
   el seu nom tal qual, sense hint. */
const SHEET_INFO = {
  'Hoja 1': { label: 'Serveis', hint: 'Serveis addicionals (DJ, menús, fotografia...): preu i a quines finques i anys s\'apliquen.' },
  'PreusMenu': { label: 'Preus per dia', hint: 'Preu per persona segons finca, any, dia de la setmana i mes.' },
  'BarraLliure': { label: 'Barra lliure', hint: 'Tarifes de barra lliure per finca i any.' },
};

// Full on s'ofereixen els filtres per Masia i Any (vegeu renderTableFilters
// a render.js): és el nom tècnic de la pestanya "Serveis".
const SERVICES_SHEET_NAME = 'Hoja 1';

const state = {
  sheets: [],
  currentName: null,
  headers: [],
  rows: [],
  loaded: false,
  filterQuery: '',
  filterMasia: [],
  filterAny: [],
};

// Cert si la fila conté algun dels valors seleccionats a la columna
// colIndex (la cel·la es divideix per comes, ja que una mateixa fila
// pot aplicar a diverses masies/anys alhora). Sense selecció, o sense
// columna, no filtra res.
function rowMatchesValueFilter(row, colIndex, selectedValues) {
  if (!selectedValues.length || colIndex === -1) return true;
  const cellParts = String(row[colIndex] || '').split(',').map(function (part) { return part.trim(); });
  return selectedValues.some(function (value) { return cellParts.indexOf(value) !== -1; });
}

var DIACRITICS_RE = new RegExp('[̀-ͯ]', 'g');
function normalizeText(value) {
  return String(value == null ? '' : value)
    .normalize('NFD')
    .replace(DIACRITICS_RE, '')
    .toLowerCase();
}

function padRow(row, width) {
  const copy = row.slice(0, width);
  while (copy.length < width) copy.push('');
  return copy;
}

function setStatus(message, type) {
  const el = document.getElementById('statusMsg');
  el.className = 'status' + (type ? ' is-' + type : '');
  el.innerHTML = (type === 'loading' || type === 'success' || type === 'error')
    ? '<span class="status-dot"></span><span>' + message + '</span>'
    : '<span>' + message + '</span>';
}

function onError(err) {
  setStatus(err && err.message ? err.message : String(err), 'error');
}
function renderTabs() {
  const nav = document.getElementById('tabs');
  nav.innerHTML = '';
  state.sheets.forEach(function (sheet) {
    const info = SHEET_INFO[sheet.name];
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (sheet.name === state.currentName ? ' active' : '');
    btn.type = 'button';
    btn.textContent = info ? info.label : sheet.name;
    btn.title = info ? sheet.name : '';
    btn.setAttribute('aria-selected', sheet.name === state.currentName ? 'true' : 'false');
    btn.addEventListener('click', function () {
      if (sheet.name === state.currentName) return;
      state.currentName = sheet.name;
      state.filterQuery = '';
      state.filterMasia = [];
      state.filterAny = [];
      document.getElementById('searchInput').value = '';
      renderTabs();
      renderSkeleton(state.headers.length || 3, 5);
      loadCurrentSheet();
    });
    nav.appendChild(btn);
  });

  const hintEl = document.getElementById('sheetHint');
  const currentInfo = SHEET_INFO[state.currentName];
  hintEl.textContent = currentInfo ? currentInfo.hint : '';
}

// Filtres per Masia i Any: només al full "Serveis", i només per a les
// columnes que hi existeixin. Es reconstrueixen cada cop que es carrega
// el full (les opcions depenen de les dades actuals), conservant la
// selecció ja feta.
function renderTableFilters() {
  const container = document.getElementById('tableFilters');
  container.innerHTML = '';
  container.hidden = state.currentName !== SERVICES_SHEET_NAME;
  if (container.hidden) return;

  [
    { header: 'Masia', selected: state.filterMasia, apply: function (values) { state.filterMasia = values; } },
    { header: 'Any', selected: state.filterAny, apply: function (values) { state.filterAny = values; } },
  ].forEach(function (def) {
    const colIndex = state.headers.indexOf(def.header);
    if (colIndex === -1) return;

    const field = buildDropdownField(
      colIndex, def.selected.join(', '), getDistinctColumnValues(colIndex, true), true, 'tableFilter', def.header
    );
    field.classList.add('table-filter');
    const hiddenInput = field.querySelector('input[type="hidden"]');
    field.addEventListener('change', function () {
      def.apply(hiddenInput.value ? hiddenInput.value.split(',').map(function (v) { return v.trim(); }).filter(Boolean) : []);
      renderTable();
    });

    container.appendChild(field);
  });
}

function renderSkeleton(cols, rows) {
  const table = document.getElementById('dataTable');
  table.innerHTML = '';
  const tbody = document.createElement('tbody');
  for (let r = 0; r < rows; r++) {
    const tr = document.createElement('tr');
    for (let c = 0; c < Math.max(cols, 1); c++) {
      const td = document.createElement('td');
      const bar = document.createElement('div');
      bar.className = 'skeleton-cell';
      bar.style.width = (60 + ((r * 7 + c * 13) % 30)) + '%';
      td.appendChild(bar);
      tr.appendChild(td);
    }
    tbody.appendChild(tr);
  }
  table.appendChild(tbody);
}

function renderTable() {
  const table = document.getElementById('dataTable');
  table.innerHTML = '';

  const thead = document.createElement('thead');
  const headRow = document.createElement('tr');

  const thActions = document.createElement('th');
  thActions.className = 'row-actions-col';
  headRow.appendChild(thActions);

  state.headers.forEach(function (label) {
    const th = document.createElement('th');
    const wrap = document.createElement('div');
    wrap.className = 'header-cell';
    wrap.textContent = label;
    th.appendChild(wrap);
    headRow.appendChild(th);
  });

  thead.appendChild(headRow);
  table.appendChild(thead);

  const tbody = document.createElement('tbody');
  const query = normalizeText(state.filterQuery).trim();
  const masiaColIndex = state.headers.indexOf('Masia');
  const anyColIndex = state.headers.indexOf('Any');
  const visible = state.rows
    .map(function (row, rowIndex) { return { row: row, rowIndex: rowIndex }; })
    .filter(function (item) {
      if (query && !item.row.some(function (cell) { return normalizeText(cell).indexOf(query) !== -1; })) return false;
      if (!rowMatchesValueFilter(item.row, masiaColIndex, state.filterMasia)) return false;
      if (!rowMatchesValueFilter(item.row, anyColIndex, state.filterAny)) return false;
      return true;
    });

  if (!state.rows.length) {
    const tr = document.createElement('tr');
    tr.className = 'empty-row';
    const td = document.createElement('td');
    td.colSpan = state.headers.length + 1;
    td.textContent = 'Encara no hi ha cap fila. Clica "+ Fila" per afegir-ne la primera.';
    tr.appendChild(td);
    tbody.appendChild(tr);
  } else if (!visible.length) {
    const tr = document.createElement('tr');
    tr.className = 'empty-row';
    const td = document.createElement('td');
    td.colSpan = state.headers.length + 1;
    td.textContent = state.filterQuery
      ? 'Cap fila coincideix amb "' + state.filterQuery + '".'
      : 'Cap fila coincideix amb els filtres seleccionats.';
    tr.appendChild(td);
    tbody.appendChild(tr);
  }

  visible.forEach(function (item) {
    const row = item.row;
    const rowIndex = item.rowIndex;
    const tr = document.createElement('tr');

    const tdActions = document.createElement('td');
    tdActions.className = 'row-actions-col';
    const del = document.createElement('button');
    del.type = 'button';
    del.className = 'icon-btn';
    del.title = 'Esborra fila';
    del.setAttribute('aria-label', 'Esborra la fila ' + (rowIndex + 1));
    del.innerHTML = ICONS.trash;
    del.addEventListener('click', function () { handleDeleteRow(rowIndex); });
    tdActions.appendChild(del);
    tr.appendChild(tdActions);

    row.forEach(function (value, colIndex) {
      const td = document.createElement('td');
      const input = document.createElement('input');
      input.className = 'cell-input';
      input.value = value;
      input.dataset.original = value;
      input.setAttribute('aria-label', (state.headers[colIndex] || 'Columna ' + (colIndex + 1)) + ', fila ' + (rowIndex + 1));
      if (isIdHeader(state.headers[colIndex])) {
        input.readOnly = true;
        input.classList.add('cell-input-readonly');
      } else {
        input.addEventListener('input', function () { input.classList.add('dirty'); });
        input.addEventListener('change', function () { saveCell(input, rowIndex, colIndex); });
      }
      td.appendChild(input);
      tr.appendChild(td);
    });

    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
}
// Capçaleres que s'editen amb un desplegable de multiselecció en lloc
// d'un camp de text lliure (els valors seleccionats es desen a la
// cel·la separats per ", ").
const MULTISELECT_HEADERS = ['Masia', 'ExtraExtresLlista'];

// splitCombined: true si una mateixa cel·la pot contenir diversos valors
// separats per comes (cas de Masia/ExtraExtresLlista); false si cada
// cel·la conté un únic valor sencer (cas d'Unit, vegeu selectfield.js).
function getDistinctColumnValues(colIndex, splitCombined) {
  const seen = {};
  state.rows.forEach(function (row) {
    const raw = String(row[colIndex] || '');
    const parts = splitCombined === false ? [raw] : raw.split(',');
    parts.forEach(function (part) {
      const trimmed = part.trim();
      if (trimmed) seen[trimmed] = true;
    });
  });
  return Object.keys(seen).sort(function (a, b) { return a.localeCompare(b, 'ca'); });
}

// Component compartit per als desplegables d'uniselecció (buildSelectField,
// buildYearField) i multiselecció (buildMultiselectField): mateix estil
// visual, es clica el nom de l'opció (no una casella al costat). En
// uniselecció, triar una opció desa el valor i tanca el panell; en
// multiselecció es poden marcar diverses sense que es tanqui.
function buildDropdownField(colIndex, initialValue, options, multi, idPrefix, placeholderText) {
  const initialSelection = multi
    ? String(initialValue || '').split(',').map(function (part) { return part.trim(); }).filter(Boolean)
    : (initialValue ? [String(initialValue)] : []);

  const wrap = document.createElement('div');
  wrap.className = 'multiselect';

  const trigger = document.createElement('button');
  trigger.type = 'button';
  trigger.id = (idPrefix || 'addRowField') + colIndex;
  trigger.className = 'multiselect-trigger';
  trigger.disabled = !options.length;
  trigger.setAttribute('aria-haspopup', 'true');
  trigger.setAttribute('aria-expanded', 'false');

  const triggerLabel = document.createElement('span');
  triggerLabel.className = 'multiselect-trigger-label';
  const triggerChevron = document.createElement('span');
  triggerChevron.className = 'multiselect-trigger-chevron';
  triggerChevron.innerHTML = ICONS.chevron;
  trigger.appendChild(triggerLabel);
  trigger.appendChild(triggerChevron);

  // En multiselecció, amb 3+ seleccions es mostra un recompte
  // ("3 seleccionades") en lloc de la llista sencera; el títol
  // (tooltip) sempre té la llista completa.
  const emptyLabel = placeholderText || 'Selecciona...';
  function setTriggerLabel(list) {
    triggerLabel.textContent = !list.length
      ? (options.length ? emptyLabel : 'Encara no hi ha valors per triar')
      : (!multi || list.length <= 2 ? list.join(', ') : list.length + ' seleccionades');
    trigger.title = list.join(', ');
  }
  setTriggerLabel(initialSelection);

  // El panel fa servir position:fixed (calculat en JS a openPanel) en
  // lloc de "absolute": si no, quedaria tallat pel scroll intern del
  // modal (.modal-fields té overflow-y: auto). Es manté com a fill
  // de "wrap" (dins el <dialog>) perquè "position: fixed" ja n'evita
  // el clipping sense necessitat de treure'l del top layer del modal.
  const panel = document.createElement('div');
  panel.className = 'multiselect-panel';
  panel.hidden = true;

  const hiddenInput = document.createElement('input');
  hiddenInput.type = 'hidden';
  hiddenInput.dataset.colIndex = String(colIndex);
  hiddenInput.value = multi ? initialSelection.join(', ') : (initialSelection[0] || '');

  const radioGroupName = 'dropdown-' + colIndex + '-' + Math.random().toString(36).slice(2);

  function updateSelection() {
    const checkedInputs = Array.prototype.filter
      .call(panel.querySelectorAll('input'), function (input) { return input.checked; });
    const values = checkedInputs.map(function (input) { return input.value; });
    hiddenInput.value = multi ? values.join(', ') : (values[0] || '');
    setTriggerLabel(values);
  }

  options.forEach(function (option) {
    const optionLabel = document.createElement('label');
    optionLabel.className = 'multiselect-option';

    // L'input real es manté per a l'estat/accessibilitat però es veu
    // ocult: es clica el nom (tota la fila), no una casella al costat.
    const optionInput = document.createElement('input');
    optionInput.type = multi ? 'checkbox' : 'radio';
    if (!multi) optionInput.name = radioGroupName;
    optionInput.className = 'multiselect-option-input';
    optionInput.value = option;
    optionInput.checked = initialSelection.indexOf(option) !== -1;

    const text = document.createElement('span');
    text.className = 'multiselect-option-text';
    text.textContent = option;

    const check = document.createElement('span');
    check.className = 'multiselect-option-check';
    check.innerHTML = ICONS.check;

    optionLabel.classList.toggle('is-selected', optionInput.checked);
    optionInput.addEventListener('change', function () {
      if (!multi) {
        panel.querySelectorAll('.multiselect-option').forEach(function (el) { el.classList.remove('is-selected'); });
      }
      optionLabel.classList.toggle('is-selected', optionInput.checked);
      updateSelection();
      if (!multi) closePanel();
    });

    optionLabel.appendChild(optionInput);
    optionLabel.appendChild(text);
    optionLabel.appendChild(check);
    panel.appendChild(optionLabel);
  });

  function repositionPanel() {
    const rect = trigger.getBoundingClientRect();
    panel.style.top = (rect.bottom + 4) + 'px';
    panel.style.left = rect.left + 'px';
    panel.style.width = rect.width + 'px';
  }

  function openPanel() {
    repositionPanel();
    panel.hidden = false;
    trigger.classList.add('is-open');
    trigger.setAttribute('aria-expanded', 'true');
    // capture:true perquè els events "scroll" no fan bombolla: així es
    // detecta tant el scroll de la finestra com el d'un contenidor
    // intern amb overflow (.modal-fields, .table-wrap...) sense haver
    // de conèixer quin és — funciona igual dins el modal que a la
    // barra d'eines de la taula.
    window.addEventListener('scroll', closePanel, { passive: true, capture: true });
    window.addEventListener('resize', closePanel);
  }

  function closePanel() {
    panel.hidden = true;
    trigger.classList.remove('is-open');
    trigger.setAttribute('aria-expanded', 'false');
    window.removeEventListener('scroll', closePanel, { capture: true });
    window.removeEventListener('resize', closePanel);
  }
  panel._closeMultiselect = closePanel;

  trigger.addEventListener('click', function (event) {
    event.stopPropagation();
    document.querySelectorAll('.multiselect-panel').forEach(function (openPanelEl) {
      if (openPanelEl !== panel && !openPanelEl.hidden && openPanelEl._closeMultiselect) openPanelEl._closeMultiselect();
    });
    if (panel.hidden) openPanel(); else closePanel();
  });

  panel.addEventListener('keydown', function (event) {
    if (event.key === 'Escape') {
      event.stopPropagation();
      closePanel();
      trigger.focus();
    }
  });

  wrap.appendChild(trigger);
  wrap.appendChild(panel);
  wrap.appendChild(hiddenInput);
  return wrap;
}

document.addEventListener('click', function () {
  document.querySelectorAll('.multiselect-panel').forEach(function (panel) {
    if (!panel.hidden && panel._closeMultiselect) panel._closeMultiselect();
  });
});

function buildMultiselectField(colIndex, initialValue, fixedOptions) {
  const options = fixedOptions || getDistinctColumnValues(colIndex, true);
  return buildDropdownField(colIndex, initialValue, options, true);
}
// Capçaleres d'un sol valor que s'editen amb un desplegable uniselecció,
// amb les opcions calculades a partir dels valors ja existents a la
// columna (una per cel·la, no combinats amb comes). Mateix component
// visual que el multiselecció (vegeu buildDropdownField a multiselect.js).
const SELECT_HEADERS = ['Unit'];

function buildSelectField(colIndex, initialValue, fixedOptions) {
  const options = fixedOptions || getDistinctColumnValues(colIndex, false);
  return buildDropdownField(colIndex, initialValue, options, false);
}
// Capçaleres booleanes: es mostren com a casella de verificació. El
// valor desat a la cel·la és "TRUE"/"FALSE" (el mateix format que fa
// servir Google Sheets per a les seves pròpies caselles de verificació).
const CHECKBOX_HEADERS = ['perConvidat', 'Optional', 'quantityBased', 'Extres', 'Desplegable'];

function buildCheckboxField(colIndex, initialValue) {
  const wrap = document.createElement('div');
  wrap.className = 'checkbox-field';

  const checkbox = document.createElement('input');
  checkbox.type = 'checkbox';
  checkbox.id = 'addRowField' + colIndex;
  checkbox.dataset.colIndex = String(colIndex);
  checkbox.checked = initialValue === 'TRUE';

  wrap.appendChild(checkbox);
  return wrap;
}
// Targeta clicable per a camps booleans (pas "Opcions"): mateixa
// semàntica que un checkbox (es desa "TRUE"/"FALSE") però es clica la
// targeta sencera en lloc de marcar una caseta petita.
function buildCardToggleField(colIndex, label, initialValue) {
  const card = document.createElement('label');
  card.className = 'option-card';

  const input = document.createElement('input');
  input.type = 'checkbox';
  input.className = 'option-card-input';
  input.id = 'addRowField' + colIndex;
  input.dataset.colIndex = String(colIndex);
  input.checked = initialValue === 'TRUE';

  const text = document.createElement('span');
  text.className = 'option-card-text';
  text.textContent = label;

  const check = document.createElement('span');
  check.className = 'option-card-check';
  check.innerHTML = ICONS.check;

  card.classList.toggle('is-selected', input.checked);
  input.addEventListener('change', function () {
    card.classList.toggle('is-selected', input.checked);
  });

  card.appendChild(input);
  card.appendChild(text);

// Secció "Desplegable" del pas de desglossament: permet construir una
// llista d'opcions (nom en 3 idiomes + preu) que es desa a la cel·la
// com a JSON: [{"CAT":"...","CAST":"...","ENG":"...","PREU":123}, ...]
const DESPLEGABLE_HEADER = 'Desplegable';

// Connecta un grup de camps [{ input, lang }] (codis 'ca'/'es'/'en')
// perquè, en escriure en un, es tradueixi automàticament als altres
// (amb debounce, com el mateix mecanisme del pas "Informació general").
function wireLangAutoTranslate(fields) {
  fields.forEach(function (field) {
    const triggerTranslate = debounce(function () {
      const text = field.input.value.trim();
      if (!text) return;

      google.script.run
        .withSuccessHandler(function (translations) {
          if (field.input.value.trim() !== text) return;
          fields.forEach(function (other) {
            if (other === field) return;
            const translated = translations[other.lang];
            if (translated === undefined || document.activeElement === other.input) return;
            other.input.value = translated;
            // Dispara "input" perquè qualsevol listener propi del camp
            // (p.ex. la sincronització de dades del Switch) se n'assabenti:
            // només assignar .value no el dispara sol. isTrusted=false en
            // aquest event evita que torni a disparar una traducció en
            // cadena (vegeu el filtre més avall).
            other.input.dispatchEvent(new Event('input', { bubbles: true }));
          });
        })
        .withFailureHandler(onError)
        .translateToLangs(text, field.lang);
    }, 400);

    field.input.addEventListener('input', function (event) {
      if (!event.isTrusted) return;
      triggerTranslate();
    });
  });
}

function parseDesplegableItems(raw) {
  try {
    const parsed = JSON.parse(raw || '[]');
    return Array.isArray(parsed) ? parsed : [];
  } catch (e) {
    return [];
  }
}

function buildDesplegableSection(colIndex) {
  const container = document.createElement('div');
  container.className = 'breakdown-section';

  const heading = document.createElement('h3');
  heading.className = 'section-heading';
  heading.textContent = 'Desplegable';
  container.appendChild(heading);

  const items = parseDesplegableItems(modalValues[colIndex]);

  const hiddenInput = document.createElement('input');
  hiddenInput.type = 'hidden';
  hiddenInput.dataset.colIndex = String(colIndex);
  hiddenInput.value = JSON.stringify(items);

  const table = document.createElement('table');
  table.className = 'desplegable-table';
  const tbody = document.createElement('tbody');
  table.appendChild(tbody);

  function renderRows() {
    tbody.innerHTML = '';
    if (!items.length) {
      const emptyRow = document.createElement('tr');
      const emptyCell = document.createElement('td');
      emptyCell.colSpan = 5;
      emptyCell.className = 'desplegable-empty';
      emptyCell.textContent = 'Encara no s\'ha afegit cap opció.';
      emptyRow.appendChild(emptyCell);
      tbody.appendChild(emptyRow);
      return;
    }
    items.forEach(function (item, index) {
      const tr = document.createElement('tr');
      [item.CAT, item.CAST, item.ENG, item.PREU + ' €'].forEach(function (text) {
        const td = document.createElement('td');
        td.textContent = text;
        tr.appendChild(td);
      });
      const tdActions = document.createElement('td');
      const removeBtn = document.createElement('button');
      removeBtn.type = 'button';
      removeBtn.className = 'icon-btn';
      removeBtn.title = 'Esborra aquesta opció';
      removeBtn.innerHTML = ICONS.trash;
      removeBtn.addEventListener('click', function () {
        items.splice(index, 1);
        hiddenInput.value = JSON.stringify(items);
        renderRows();
      });
      tdActions.appendChild(removeBtn);
      tr.appendChild(tdActions);
      tbody.appendChild(tr);
    });
  }
  renderRows();

  const form = document.createElement('div');
  form.className = 'desplegable-form';

  const catInput = document.createElement('input');
  catInput.type = 'text';
  catInput.placeholder = 'Català';

  const castInput = document.createElement('input');
  castInput.type = 'text';
  castInput.placeholder = 'Castellà';

  const engInput = document.createElement('input');
  engInput.type = 'text';
  engInput.placeholder = 'Anglès';

  const priceWrap = document.createElement('div');
  priceWrap.className = 'currency-field';
  const priceInput = document.createElement('input');
  priceInput.type = 'number';
  priceInput.step = '0.01';
  priceInput.placeholder = 'Preu';
  const priceSuffix = document.createElement('span');
  priceSuffix.className = 'currency-suffix';
  priceSuffix.textContent = '€';
  priceWrap.appendChild(priceInput);
  priceWrap.appendChild(priceSuffix);

  const addBtn = document.createElement('button');
  addBtn.type = 'button';
  addBtn.className = 'btn btn-primary';
  addBtn.textContent = 'Afegeix a la taula';

  function isEntryValid() {
    return Boolean(catInput.value.trim() && castInput.value.trim() && engInput.value.trim() && priceInput.value !== '');
  }
  function refreshAddBtn() { addBtn.disabled = !isEntryValid(); }
  refreshAddBtn();

  function addEntry() {
    if (!isEntryValid()) return;
    items.push({
      CAT: catInput.value.trim(),
      CAST: castInput.value.trim(),
      ENG: engInput.value.trim(),
      PREU: Number(priceInput.value),
    });
    hiddenInput.value = JSON.stringify(items);
    renderRows();
    catInput.value = '';
    castInput.value = '';
    engInput.value = '';
    priceInput.value = '';
    refreshAddBtn();
    catInput.focus();
  }

  addBtn.addEventListener('click', addEntry);

  // Evita que un Enter dins d'aquests camps enviï tot el formulari del
  // modal (podria coincidir amb el pas final): en aquest mini-formulari
  // Enter equival a "Afegeix a la taula".
  [catInput, castInput, engInput, priceInput].forEach(function (input) {
    input.addEventListener('input', refreshAddBtn);
    input.addEventListener('keydown', function (event) {
      if (event.key !== 'Enter') return;
      event.preventDefault();
      addEntry();
    });
  });

  wireLangAutoTranslate([
    { input: catInput, lang: 'ca' },
    { input: castInput, lang: 'es' },
    { input: engInput, lang: 'en' },
  ]);

  form.appendChild(catInput);
  form.appendChild(castInput);
  form.appendChild(engInput);
  form.appendChild(priceWrap);
  form.appendChild(addBtn);

  container.appendChild(table);
  container.appendChild(form);
  container.appendChild(hiddenInput);
  return container;
}

// Capçaleres de nom de servei que es tradueixen automàticament entre
// elles (ha de coincidir amb SERVICE_NAME_LANGS a Código.js).
const SERVICE_NAME_HEADERS = ['Nom Servei', 'NomCAST', 'NomENG'];

// Pantalles fixes del formulari de nova fila (només mostren les
// columnes de la seva llista que existeixin al full actual).
const FIELD_STEPS = [
  { title: 'Informació general', headers: ['Nom Servei', 'NomCAST', 'NomENG', 'Masia', 'Any', 'Preu'] },
  { title: 'Opcions', headers: ['perConvidat', 'Optional', 'quantityBased', 'Extres'] },
];

// Pas 3 (condicional): cada camp només apareix si la casella de la
// columna "conditionHeader" (pas "Opcions") s'ha marcat.
const DETAIL_STEP_FIELDS = [
  { header: 'Unit', conditionHeader: 'quantityBased', kind: 'select', options: ['Pack', 'Persona'] },
  { header: 'ExtresLlista', conditionHeader: 'Extres', kind: 'multiselect', options: ['Desplegable', 'Llindà', 'Altres Extres'] },
];

// Índexs de pas (fixos: 0 i 1 sempre existeixen; 2, 3 i 4 són condicionals).
const STEP_GENERAL = 0;
const STEP_OPTIONS = 1;
const STEP_DETAILS = 2;
const STEP_BREAKDOWN = 3;
const STEP_EXTRAS = 4;

let modalStepIndex = 0;
let modalValues = {};

function getStepColIndexes(step) {
  return step.headers
    .map(function (header) { return state.headers.indexOf(header); })
    .filter(function (colIndex) { return colIndex !== -1; });
}

// Llegeix l'estat actual (encara que no s'hagi capturat a modalValues)
// d'un camp del pas visible, per decidir en temps real si cal avançar.
function readLiveValue(colIndex) {
  const liveEl = document.querySelector('#addRowFields [data-col-index="' + colIndex + '"]');
  if (!liveEl) return modalValues[colIndex];
  return liveEl.type === 'checkbox' ? (liveEl.checked ? 'TRUE' : 'FALSE') : liveEl.value;
}

function isDetailsStepNeededLive() {
  return DETAIL_STEP_FIELDS.some(function (def) {
    const condColIndex = state.headers.indexOf(def.conditionHeader);
    return condColIndex !== -1 && readLiveValue(condColIndex) === 'TRUE';
  });
}

function getActiveDetailFields() {
  return DETAIL_STEP_FIELDS.filter(function (def) {
    const condColIndex = state.headers.indexOf(def.conditionHeader);
    return condColIndex !== -1
      && modalValues[condColIndex] === 'TRUE'
      && state.headers.indexOf(def.header) !== -1;
  });
}

function getSelectedExtresLlistaLive() {
  const colIndex = state.headers.indexOf('ExtresLlista');
  if (colIndex === -1) return [];
  const raw = readLiveValue(colIndex) || '';
  return String(raw).split(',').map(function (part) { return part.trim(); }).filter(Boolean);
}

function isBreakdownStepNeededLive() {
  return getSelectedExtresLlistaLive().length > 0;
}

function getSelectedAltresExtresLive() {
  const colIndex = state.headers.indexOf('ExtraExtresLlista');
  if (colIndex === -1) return [];
  const raw = readLiveValue(colIndex) || '';
  return String(raw).split(',').map(function (part) { return part.trim(); }).filter(Boolean);
}

function isExtrasStepNeededLive() {
  return getSelectedAltresExtresLive().length > 0;
}

// Nombre de passos previstos amb la informació que es coneix fins ara
// (les tries encara no fetes es donen per "no calen"): la barra de
// progrés es recalcula cada pas i pot créixer a mesura que l'usuari
// marca opcions que n'afegeixen més endavant.
function getPlannedStepCount() {
  let count = 2;
  if (isDetailsStepNeededLive()) {
    count++;
    if (isBreakdownStepNeededLive()) {
      count++;
      if (isExtrasStepNeededLive()) count++;
    }
  }
  return count;
}

function openAddRowModal() {
  modalStepIndex = STEP_GENERAL;
  modalValues = {};
  renderModalStep();
  document.getElementById('addRowModal').showModal();
}

function closeAddRowModal() {
  document.getElementById('addRowModal').close();
}

function captureStepValues() {
  document.querySelectorAll('#addRowFields [data-col-index]').forEach(function (el) {
    const colIndex = Number(el.dataset.colIndex);
    modalValues[colIndex] = el.type === 'checkbox' ? (el.checked ? 'TRUE' : 'FALSE') : el.value;
  });
}

function buildFieldControl(colIndex, label, isId) {
  const initialValue = modalValues[colIndex];

  if (MULTISELECT_HEADERS.indexOf(label) !== -1) return buildMultiselectField(colIndex, initialValue);
  if (label === YEAR_HEADER) return buildYearField(colIndex, initialValue);
  if (SELECT_HEADERS.indexOf(label) !== -1) return buildSelectField(colIndex, initialValue);
  if (CHECKBOX_HEADERS.indexOf(label) !== -1) return buildCheckboxField(colIndex, initialValue);
  if (CURRENCY_HEADERS.indexOf(label) !== -1) return buildCurrencyField(colIndex, initialValue);

  const input = document.createElement('input');
  input.type = 'text';
  input.id = 'addRowField' + colIndex;
  input.dataset.colIndex = String(colIndex);
  if (isId) {
    input.value = crypto.randomUUID();
    input.readOnly = true;
  } else {
    if (initialValue) input.value = initialValue;
    if (SERVICE_NAME_HEADERS.indexOf(label) !== -1) {
      input.dataset.langHeader = label;
      input.addEventListener('input', debounce(handleServiceNameInput, 400));
    }
  }
  return input;
}

function getFieldControlValue(colIndex) {
  const el = document.querySelector('#addRowFields [data-col-index="' + colIndex + '"]');
  return el ? String(el.value || '') : '';
}

function appendField(container, colIndex, label, control, options) {
  options = options || {};
  const field = document.createElement('div');
  field.className = 'modal-field' + (isIdHeader(label) ? ' modal-field-readonly' : '');
  // Atribut propi (diferent de "data-col-index"): si reutilitzéssim
  // data-col-index aquí, les cerques puntuals com getFieldControlValue
  // trobarien primer aquest <div> embolcall (buit) en lloc de l'input
  // real, ja que apareix abans en l'ordre del document.
  field.dataset.fieldIndex = String(colIndex);

  const fieldLabel = document.createElement('label');
  fieldLabel.textContent = label || 'Columna ' + (colIndex + 1);
  fieldLabel.setAttribute('for', 'addRowField' + colIndex);
  if (options.required) {
    const asterisk = document.createElement('span');
    asterisk.className = 'modal-field-required';
    asterisk.textContent = ' *';
    asterisk.setAttribute('aria-hidden', 'true');
    fieldLabel.appendChild(asterisk);
  }

  field.appendChild(fieldLabel);
  field.appendChild(control);

  if (options.required) {
    const error = document.createElement('p');
    error.className = 'modal-field-error';
    error.textContent = 'Aquest camp és obligatori.';
    field.appendChild(error);

    field.addEventListener('input', function () {
      if (getFieldControlValue(colIndex).trim() !== '') field.classList.remove('is-invalid');
    });
    field.addEventListener('change', function () {
      if (getFieldControlValue(colIndex).trim() !== '') field.classList.remove('is-invalid');
    });
  }

  container.appendChild(field);
}

// Valida el pas "Informació general": tots els camps hi són obligatoris
// (excepte un desplegable/multiselecció desactivat perquè encara no hi
// ha cap valor entre els quals triar). Marca visualment els buits i
// retorna si es pot avançar.
function validateStepGeneral() {
  const fieldsWrap = document.getElementById('addRowFields');
  let allValid = true;
  let firstInvalidField = null;

  getStepColIndexes(FIELD_STEPS[STEP_GENERAL]).forEach(function (colIndex) {
    const fieldEl = fieldsWrap.querySelector('.modal-field[data-field-index="' + colIndex + '"]');
    if (!fieldEl) return;
    const disabledControl = fieldEl.querySelector('.multiselect-trigger:disabled');
    const isEmpty = !disabledControl && getFieldControlValue(colIndex).trim() === '';
    fieldEl.classList.toggle('is-invalid', isEmpty);
    if (isEmpty) {
      allValid = false;
      if (!firstInvalidField) firstInvalidField = fieldEl;
    }
  });

  if (firstInvalidField) {
    const focusable = firstInvalidField.querySelector('input:not([type="hidden"]), .multiselect-trigger');
    if (focusable) focusable.focus();
  }
  return allValid;
}

function buildAltresExtresSection() {
  const colIndex = state.headers.indexOf('ExtraExtresLlista');
  if (colIndex === -1) return null;

  const container = document.createElement('div');
  container.className = 'breakdown-section';

  const heading = document.createElement('h3');
  heading.className = 'section-heading';

  const fieldsGrid = document.createElement('div');
  fieldsGrid.className = 'modal-fields modal-fields-nested';
  const control = buildMultiselectField(colIndex, modalValues[colIndex], ['Input Númeric', 'Switch']);
  appendField(fieldsGrid, colIndex, 'ExtraExtresLlista', control);
  control.querySelectorAll('input[type="checkbox"]').forEach(function (checkbox) {
    checkbox.addEventListener('change', updateModalNavButtons);
  });
  container.appendChild(fieldsGrid);
  return container;
}

function renderModalStep() {
  const fieldsWrap = document.getElementById('addRowFields');
  fieldsWrap.innerHTML = '';

  const titles = ['Informació general', 'Opcions', 'Detalls addicionals', 'Detall dels extres', 'Configuració addicional'];
  document.getElementById('addRowTitle').textContent = 'Nova fila';
  document.getElementById('addRowStep').textContent = 'Pas ' + (modalStepIndex + 1) + ' — ' + titles[modalStepIndex];
  document.getElementById('addRowModal').classList.toggle(
    'modal-wide', modalStepIndex === STEP_BREAKDOWN || modalStepIndex === STEP_EXTRAS
  );

  if (modalStepIndex === STEP_EXTRAS) {
    const selectedExtras = getSelectedAltresExtresLive();
    if (selectedExtras.indexOf('Input Númeric') !== -1) {
      const colIndex = state.headers.indexOf('ExtraUnitat');
      if (colIndex !== -1) fieldsWrap.appendChild(buildInputNumericSection(colIndex));
    }
    if (selectedExtras.indexOf('Switch') !== -1) {
      const colIndex = state.headers.indexOf('ExtraSwitch');
      if (colIndex !== -1) fieldsWrap.appendChild(buildSwitchSection(colIndex));
    }
  } else if (modalStepIndex === STEP_BREAKDOWN) {
    const selected = getSelectedExtresLlistaLive();
    if (selected.indexOf('Desplegable') !== -1) {
      const colIndex = state.headers.indexOf(DESPLEGABLE_HEADER);
      if (colIndex !== -1) fieldsWrap.appendChild(buildDesplegableSection(colIndex));
    }
    if (selected.indexOf('Llindà') !== -1) {
      fieldsWrap.appendChild(buildLlindaSection());
    }
    if (selected.indexOf('Altres Extres') !== -1) {
      const section = buildAltresExtresSection();
      if (section) fieldsWrap.appendChild(section);
    }
  } else if (modalStepIndex === STEP_DETAILS) {
    getActiveDetailFields().forEach(function (def) {
      const colIndex = state.headers.indexOf(def.header);
      const initialValue = modalValues[colIndex];
      const control = def.kind === 'select'
        ? buildSelectField(colIndex, initialValue, def.options)
        : buildMultiselectField(colIndex, initialValue, def.options);
      appendField(fieldsWrap, colIndex, def.header, control);

      if (def.header === 'ExtresLlista') {
        control.querySelectorAll('input[type="checkbox"]').forEach(function (checkbox) {
          checkbox.addEventListener('change', updateModalNavButtons);
        });
      }
    });
  } else if (modalStepIndex === STEP_OPTIONS) {
    const grid = document.createElement('div');
    grid.className = 'option-card-grid';
    getStepColIndexes(FIELD_STEPS[STEP_OPTIONS]).forEach(function (colIndex) {
      const label = state.headers[colIndex];
      const card = buildCardToggleField(colIndex, label, modalValues[colIndex]);
      grid.appendChild(card);
    });
    fieldsWrap.appendChild(grid);

    ['quantityBased', 'Extres'].forEach(function (header) {
      const colIndex = state.headers.indexOf(header);
      if (colIndex === -1) return;
      const checkbox = document.querySelector('#addRowFields [data-col-index="' + colIndex + '"]');
      if (checkbox) checkbox.addEventListener('change', updateModalNavButtons);
    });
  } else {
    getStepColIndexes(FIELD_STEPS[modalStepIndex]).forEach(function (colIndex) {
      const label = state.headers[colIndex];
      appendField(
        fieldsWrap, colIndex, label, buildFieldControl(colIndex, label, isIdHeader(label)),
        { required: modalStepIndex === STEP_GENERAL }
      );
    });
  }

  updateModalNavButtons();
  fieldsWrap.classList.remove('is-entering');
  void fieldsWrap.offsetWidth; // força el reflow perquè l'animació es reiniciï cada pas
  fieldsWrap.classList.add('is-entering');

  const firstInput = fieldsWrap.querySelector('input:not([readonly]):not([type="hidden"]), .multiselect-trigger:not(:disabled)');
  if (firstInput) firstInput.focus();
}

function isLastStep() {
  if (modalStepIndex === STEP_GENERAL) return false;
  if (modalStepIndex === STEP_OPTIONS) return !isDetailsStepNeededLive();
  if (modalStepIndex === STEP_DETAILS) return !isBreakdownStepNeededLive();
  if (modalStepIndex === STEP_BREAKDOWN) return !isExtrasStepNeededLive();
  return true;
}

function updateProgressBar() {
  const plannedSteps = Math.max(getPlannedStepCount(), modalStepIndex + 1);
  document.getElementById('addRowProgressFill').style.width =
    Math.round(((modalStepIndex + 1) / plannedSteps) * 100) + '%';
}

function updateModalNavButtons() {
  const isFirst = modalStepIndex === STEP_GENERAL;
  const isLast = isLastStep();
  document.getElementById('addRowBackBtn').hidden = isFirst;
  document.getElementById('addRowNextBtn').hidden = isLast;
  document.getElementById('addRowSubmitBtn').hidden = !isLast;
  updateProgressBar();
}

function handleModalNext() {
  captureStepValues();
  if (modalStepIndex === STEP_GENERAL && !validateStepGeneral()) return;
  if (isLastStep()) return;
  modalStepIndex++;
  renderModalStep();
}

function handleModalBack() {
  captureStepValues();
  if (modalStepIndex === STEP_GENERAL) return;
  modalStepIndex--;
  renderModalStep();
}

function debounce(fn, delayMs) {
  let timeoutId;
  return function () {
    const args = arguments;
    const context = this;
    clearTimeout(timeoutId);
    timeoutId = setTimeout(function () { fn.apply(context, args); }, delayMs);
  };
}

function handleServiceNameInput(event) {
  const sourceInput = event.target;
  const sourceHeader = sourceInput.dataset.langHeader;
  const text = sourceInput.value.trim();
  if (!text) return;

  google.script.run
    .withSuccessHandler(function (translations) {
      // Descarta la resposta si l'usuari ha seguit escrivint mentrestant.
      if (sourceInput.value.trim() !== text) return;
      Object.keys(translations).forEach(function (header) {
        const targetInput = document.querySelector('#addRowFields input[data-lang-header="' + header + '"]');
        if (targetInput && document.activeElement !== targetInput) targetInput.value = translations[header];
      });
    })
    .withFailureHandler(onError)
    .translateServiceName(text, sourceHeader);
}

function submitAddRowForm(event) {
  event.preventDefault();
  captureStepValues();

  const values = state.headers.map(function (_, colIndex) {
    return modalValues[colIndex] !== undefined ? modalValues[colIndex] : '';
  });

  closeAddRowModal();
  setStatus('Afegint fila...', 'loading');
  google.script.run
    .withSuccessHandler(loadCurrentSheet)
    .withFailureHandler(onError)
    .appendRow(state.currentName, values);
}
function loadMeta() {
  setStatus('Carregant...', 'loading');
  google.script.run.withSuccessHandler(onMetaLoaded).withFailureHandler(onError).getSheetsMeta();
}

function onMetaLoaded(sheets) {
  state.sheets = sheets;
  if (!state.sheets.length) {
    setStatus('El full de càlcul no té cap pestanya.', 'error');
    return;
  }
  if (!state.currentName) state.currentName = state.sheets[0].name;
  renderTabs();
  loadCurrentSheet();
}

function loadCurrentSheet() {
  setStatus('Carregant...', 'loading');
  google.script.run.withSuccessHandler(onSheetLoaded).withFailureHandler(onError).getSheetData(state.currentName);
}

function onSheetLoaded(data) {
  state.headers = data.headers || [];
  const width = state.headers.length;
  state.rows = (data.rows || []).map(function (row) { return padRow(row, width); });
  state.loaded = true;
  renderTableFilters();
  renderTable();
  setStatus(state.rows.length + ' files carregades.', 'success');
}

function saveCell(input, rowIndex, colIndex) {
  const value = input.value;
  if (value === input.dataset.original) {
    input.classList.remove('dirty');
    return;
  }
  setStatus('Desant...', 'loading');
  google.script.run
    .withSuccessHandler(function () {
      state.rows[rowIndex][colIndex] = value;
      input.dataset.original = value;
      input.classList.remove('dirty');
      setStatus('Desat.', 'success');
    })
    .withFailureHandler(function (err) {
      input.value = input.dataset.original;
      input.classList.remove('dirty');
      onError(err);
    })
    .updateCell(state.currentName, rowIndex, colIndex, value);
}

function handleAddRow() {
  openAddRowModal();
}

function handleDeleteRow(rowIndex) {
  const label = state.rows[rowIndex][0] || ('fila ' + (rowIndex + 1));
  if (!confirm('Segur que vols esborrar "' + label + '"?')) return;
  setStatus('Esborrant fila...', 'loading');
  google.script.run
    .withSuccessHandler(loadCurrentSheet)
    .withFailureHandler(onError)
    .deleteRow(state.currentName, rowIndex);
}
document.addEventListener('DOMContentLoaded', function () {
  document.getElementById('addRowBtn').innerHTML = ICONS.plus + '<span>Fila</span>';
  document.getElementById('refreshBtn').innerHTML = ICONS.refresh;

  document.getElementById('searchIcon').innerHTML = ICONS.search;

  document.getElementById('addRowBtn').addEventListener('click', handleAddRow);
  document.getElementById('refreshBtn').addEventListener('click', loadCurrentSheet);
  document.getElementById('searchInput').addEventListener('input', function (e) {
    state.filterQuery = e.target.value;
    renderTable();
  });

  document.getElementById('addRowForm').addEventListener('submit', submitAddRowForm);
  document.getElementById('addRowCancelBtn').addEventListener('click', closeAddRowModal);
  document.getElementById('addRowNextBtn').addEventListener('click', handleModalNext);
  document.getElementById('addRowBackBtn').addEventListener('click', handleModalBack);

  renderSkeleton(3, 5);
  loadMeta();
});
  </script>
</body>
</html>
