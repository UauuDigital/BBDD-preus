<style>
/* ---------------------------------------------------------
   Tokens — alineats amb el brandbook UAUU (pressupostos/colors_and_type.css)
   --------------------------------------------------------- */
:root {
  /* Blacks / neutrals */
  --color-ink:      #1c1c1a;
  --color-charcoal: #333333;
  --color-body:     #515856;
  /* #7e8c8d donava ~3.5:1 sobre blanc, per sota del mínim AA (4.5:1)
     per a text normal. #667077 hi arriba amb marge (~5:1). */
  --color-muted:    #667077;

  /* Warm neutrals (accent) */
  --color-sand:       #cdc4b1;
  --color-sand-dark:  #a99c81;
  --color-sand-light: #e8e2d8;
  --color-sand-pale:  #f5f2ed;

  /* Masies (calendari "Preus per dia") — colors fixos per masia,
     centralitzats aquí perquè no quedin com a hexadecimals solts al JS. */
  --masia-alzina:  #D0E7FF;
  --masia-macia:   #E1F2D1;
  --masia-tous:    #FFEAA7;
  --masia-vivencs: #FFD2BC;
  --masia-default: #9ca3af;

  /* "Any" (Preus per dia): mateix codi de colors que les marques de les
     abelles reines apicultores (estàndard "Will You Raise Good Bees"),
     es repeteix cada 5 anys — no per relació amb l'any actual. */
  --year-white:   #f4f1ea;
  --year-yellow:  #e0b400;
  --year-red:     #a5433a;
  --year-green:   #4f6f52;
  --year-blue:    #3d6f8a;
  --year-neutral: var(--color-sand);

  /* Structure */
  --color-divider:  #e7e4de;
  --color-surface:  #faf9f6;
  --color-white:    #ffffff;

  /* State */
  --color-danger:      #a5433a;
  --color-danger-bg:   #f6e9e7;
  --color-success:     #4f6f52;
  --color-success-bg:  #ecf1ea;

  /* Semantic */
  --fg-primary:   var(--color-ink);
  --fg-secondary: var(--color-body);
  --fg-tertiary:  var(--color-muted);
  --fg-inverse:   var(--color-white);

  --bg-page:    var(--color-white);
  --bg-surface: var(--color-surface);
  --bg-warm:    var(--color-sand-pale);

  --border-default: var(--color-divider);
  --focus-ring:      var(--color-charcoal);

  --action-primary-bg:       var(--color-charcoal);
  --action-primary-hover-bg: #474747;
  --action-primary-fg:       var(--color-white);

  /* Type */
  --font-display: 'Cormorant Garamond', 'Georgia', serif;
  --font-ui:      'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;

  --text-xs:   0.75rem;
  --text-sm:   0.8125rem;
  --text-base: 0.875rem;
  --text-md:   0.9375rem;
  --text-lg:   1.0625rem;
  --text-display: 1.625rem;

  /* Space */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;

  /* Shape */
  --radius-sm: 6px;
  --radius-md: 8px;
  --radius-pill: 999px;

  --shadow-sm: 0 1px 2px rgba(28, 28, 26, 0.06), 0 1px 1px rgba(28, 28, 26, 0.04);

  --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
  --duration: 160ms;

  /* Vora dels punts de color (Masia/Any/calendari): un sol token en
     lloc de repetir el mateix rgba() a diversos fitxers CSS. */
  --dot-border: rgba(28, 28, 26, 0.15);
}

/* Decisió deliberada: aquesta eina interna no ofereix mode fosc (no hi
   ha cap bloc "prefers-color-scheme: dark"). No és un oblit. */

* { box-sizing: border-box; }

/* Sense això, classes com .btn (display: inline-flex) guanyarien a
   l'estil per defecte del navegador per a [hidden] (mateixa especificitat,
   però l'autor sempre guanya al full d'estils UA) i l'element es veuria
   igualment encara que JS li posi hidden = true. */
[hidden] { display: none !important; }

body {
  margin: 0;
  font-family: var(--font-ui);
  font-size: var(--text-base);
  color: var(--fg-primary);
  background: var(--bg-page);
  -webkit-font-smoothing: antialiased;
}

button, input {
  font-family: inherit;
  font-size: inherit;
  color: inherit;
}
/* ---------------------------------------------------------
   Topbar
   --------------------------------------------------------- */
.topbar {
  display: flex;
  align-items: baseline;
  gap: var(--space-3);
  padding: var(--space-4) var(--space-6);
  background: var(--bg-page);
  border-bottom: 1px solid var(--border-default);
}

.wordmark {
  font-family: var(--font-display);
  font-weight: 500;
  font-style: italic;
  font-size: var(--text-display);
  letter-spacing: -0.01em;
  margin: 0;
  color: var(--fg-primary);
}

.eyebrow {
  font-family: var(--font-ui);
  font-weight: 600;
  font-size: calc(var(--text-display) - 1px);
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--color-ink);
}

/* ---------------------------------------------------------
   Layout
   --------------------------------------------------------- */
.app {
  max-width: 1400px;
  margin: 0 auto;
  padding: var(--space-6);
}

/* ---------------------------------------------------------
   Tabs — underline style
   --------------------------------------------------------- */
.tabs {
  display: flex;
  gap: var(--space-5);
  margin-bottom: var(--space-5);
  border-bottom: 1px solid var(--border-default);
}

.tab-btn {
  position: relative;
  border: none;
  background: none;
  padding: var(--space-2) var(--space-1) var(--space-3);
  cursor: pointer;
  font-size: var(--text-md);
  font-weight: 500;
  color: var(--fg-tertiary);
  transition: color var(--duration) var(--ease-out);
}

.tab-btn::after {
  content: '';
  position: absolute;
  left: 0;
  right: 0;
  bottom: -1px;
  height: 2px;
  background: var(--color-ink);
  transform: scaleX(0);
  transform-origin: center;
  transition: transform var(--duration) var(--ease-out);
}

.tab-btn:hover { color: var(--fg-primary); }
.tab-btn.active { color: var(--fg-primary); }
.tab-btn.active::after { transform: scaleX(1); }

.tab-btn:focus-visible {
  outline: 2px solid var(--focus-ring);
  outline-offset: 2px;
  border-radius: var(--radius-sm);
}

@media (prefers-reduced-motion: reduce) {
  .tab-btn::after { transition: none; }
}

/* Vinyeta pròpia (no el "title" natiu del navegador), amb el mateix
   to fosc que .btn-primary: substitueix el tooltip natiu a tots els
   botons que en tenen (pestanyes, accions de fila, desplegables...).
   Base compartida aquí; cada component només en fixa la posició
   (vegeu .tab-btn[data-tooltip]::before, .icon-btn[data-tooltip]::before,
   .multiselect-trigger[data-tooltip]::before). S'usa ::before perquè
   ::after ja el fan servir altres components (p.ex. el subratllat de
   la pestanya activa). */
[data-tooltip] {
  position: relative;
}
[data-tooltip]::before {
  content: attr(data-tooltip);
  position: absolute;
  width: max-content;
  max-width: 260px;
  padding: var(--space-2) var(--space-3);
  border-radius: var(--radius-sm);
  background: var(--color-ink);
  color: var(--color-white);
  font-size: var(--text-xs);
  font-weight: 400;
  line-height: 1.4;
  text-align: left;
  white-space: normal;
  box-shadow: var(--shadow-sm);
  z-index: 40;
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
  transition: opacity var(--duration) var(--ease-out), transform var(--duration) var(--ease-out);
}
[data-tooltip]:hover::before,
[data-tooltip]:focus-visible::before {
  opacity: 1;
  visibility: visible;
}
@media (prefers-reduced-motion: reduce) {
  [data-tooltip]::before { transition: none; }
}

.tab-btn[data-tooltip]::before {
  top: calc(100% + var(--space-2));
  left: 50%;
  transform: translateX(-50%) translateY(4px);
}
.tab-btn[data-tooltip]:hover::before,
.tab-btn[data-tooltip]:focus-visible::before {
  transform: translateX(-50%) translateY(0);
}
/* ---------------------------------------------------------
   Toolbar
   --------------------------------------------------------- */
.toolbar {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: var(--space-2);
  margin-bottom: var(--space-4);
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  border: 1px solid var(--border-default);
  background: var(--bg-page);
  color: var(--fg-primary);
  padding: var(--space-2) var(--space-3);
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: var(--text-sm);
  font-weight: 500;
  transition: background var(--duration) var(--ease-out), border-color var(--duration) var(--ease-out);
}

.btn svg { flex-shrink: 0; }

.btn:hover { background: var(--bg-surface); border-color: var(--color-sand-dark); }
.btn:active { background: var(--color-sand-light); }

.btn:focus-visible {
  outline: 2px solid var(--focus-ring);
  outline-offset: 2px;
}

.btn-primary {
  background: var(--action-primary-bg);
  border-color: var(--action-primary-bg);
  color: var(--action-primary-fg);
}
.btn-primary:hover { background: var(--action-primary-hover-bg); border-color: var(--action-primary-hover-bg); }
.btn-primary:active { background: var(--color-ink); }

.btn-ghost {
  background: transparent;
  border-color: transparent;
  color: var(--fg-secondary);
}
.btn-ghost:hover { background: var(--bg-surface); }

/* Vinyeta a sota i centrada, com les pestanyes (mateixa base a
   [data-tooltip]::before): botons "+ Fila" i "Refresca". */
.btn[data-tooltip]::before {
  top: calc(100% + var(--space-2));
  left: 50%;
  transform: translateX(-50%) translateY(4px);
}
.btn[data-tooltip]:hover::before,
.btn[data-tooltip]:focus-visible::before {
  transform: translateX(-50%) translateY(0);
}

.toolbar-spacer { flex: 1; }

.table-filters {
  display: flex;
  flex-wrap: nowrap;
  align-items: center;
  gap: var(--space-2);
  overflow-x: auto;
  max-width: 100%;
}
.table-filters[hidden] { display: none; }

.table-filters .table-filter { flex: 0 0 140px; }

.simplify-toggle {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  font-size: var(--text-sm);
  font-weight: 500;
  color: var(--fg-secondary);
  cursor: pointer;
}
.simplify-toggle input { accent-color: var(--color-charcoal); cursor: pointer; }

.view-toggle {
  display: flex;
  gap: 2px;
  padding: 2px;
  background: var(--bg-surface);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-sm);
}

.view-toggle-btn {
  border: none;
  background: transparent;
  padding: var(--space-1) var(--space-3);
  border-radius: calc(var(--radius-sm) - 2px);
  font-size: var(--text-sm);
  font-weight: 500;
  color: var(--fg-tertiary);
  cursor: pointer;
  transition: background var(--duration) var(--ease-out), color var(--duration) var(--ease-out);
}
.view-toggle-btn:hover { color: var(--fg-primary); }
.view-toggle-btn.is-active {
  background: var(--bg-page);
  color: var(--fg-primary);
  box-shadow: var(--shadow-sm);
}
.view-toggle-btn:focus-visible {
  outline: 2px solid var(--focus-ring);
  outline-offset: 2px;
}

.sheet-hint {
  margin: calc(var(--space-5) * -1 + var(--space-1)) 0 var(--space-4);
  font-size: var(--text-sm);
  color: var(--fg-tertiary);
}

/* ---------------------------------------------------------
   Status indicator
   --------------------------------------------------------- */
.status {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  font-size: var(--text-sm);
  color: var(--fg-tertiary);
  min-height: 1.25rem;
}

.status.is-loading .status-dot {
  width: 8px; height: 8px; border-radius: 50%;
  border: 1.5px solid var(--color-sand-dark);
  border-top-color: transparent;
  animation: spin 700ms linear infinite;
}

.status.is-success { color: var(--color-success); }
.status.is-success .status-dot::before { content: '✓'; font-size: 0.85em; }

.status.is-error { color: var(--color-danger); font-weight: 500; }
.status.is-error .status-dot::before { content: '!'; font-size: 0.8em; font-weight: 700; }

@keyframes spin { to { transform: rotate(360deg); } }
@media (prefers-reduced-motion: reduce) {
  .status.is-loading .status-dot { animation: none; border-top-color: var(--color-sand-dark); }
}
/* ---------------------------------------------------------
   Table
   --------------------------------------------------------- */
.table-wrap {
  overflow: auto;
  background: var(--bg-page);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-md);
  max-height: calc(100vh - 220px);
}

table { border-collapse: collapse; width: 100%; font-size: var(--text-base); }

th, td {
  border-bottom: 1px solid var(--border-default);
  border-right: 1px solid var(--border-default);
  padding: 0;
  min-width: 150px;
}
th:last-child, td:last-child { border-right: none; }

thead th {
  background: var(--bg-surface);
  position: sticky;
  top: 0;
  z-index: 1;
  text-align: left;
}

.header-cell {
  display: flex;
  align-items: center;
  gap: var(--space-1);
  width: 100%;
  padding: var(--space-3) var(--space-2);
  border: none;
  background: transparent;
  font-family: inherit;
  font-weight: 600;
  font-size: var(--text-sm);
  color: var(--fg-primary);
  text-align: left;
  cursor: pointer;
}
.header-cell:hover { background: var(--color-sand-pale); }
.header-cell:focus-visible {
  outline: 2px solid var(--focus-ring);
  outline-offset: -2px;
}

.header-cell-label {
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.header-cell-sort-icon {
  display: inline-flex;
  flex-shrink: 0;
  color: var(--fg-tertiary);
}
.header-cell-sort-icon.is-asc { transform: rotate(180deg); }

.icon-btn {
  position: relative;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 26px;
  height: 26px;
  border: none;
  background: transparent;
  color: var(--fg-tertiary);
  cursor: pointer;
  border-radius: var(--radius-sm);
  /* 0,55 donava ~1,8:1 de contrast en repòs, per sota del mínim 3:1
     (WCAG 1.4.11) per a components no textuals; 0,75 hi arriba amb
     marge sense perdre l'efecte de "es marca més en fer hover". */
  opacity: 0.75;
  transition: opacity var(--duration) var(--ease-out), background var(--duration) var(--ease-out), color var(--duration) var(--ease-out);
}
tr:hover .icon-btn,
.icon-btn:focus-visible { opacity: 1; }
.icon-btn:hover { color: var(--color-danger); background: var(--color-danger-bg); opacity: 1; }
.icon-btn:focus-visible { outline: 2px solid var(--focus-ring); outline-offset: 1px; }

/* Vinyeta a la dreta del botó (no a sota, com les pestanyes) perquè no
   quedi tallada pel scroll vertical de .table-wrap. */
.icon-btn[data-tooltip]::before {
  left: calc(100% + var(--space-2));
  top: 50%;
  max-width: 200px;
  transform: translateY(-50%) translateX(-4px);
}
.icon-btn[data-tooltip]:hover::before,
.icon-btn[data-tooltip]:focus-visible::before {
  transform: translateY(-50%) translateX(0);
}

/* 26px és massa petit per a un dit (mínim recomanat 44px): només
   s'agranda en dispositius sense precisió de ratolí, per no fer
   créixer la UI de forma innecessària en desktop. */
@media (pointer: coarse) {
  .icon-btn { width: 44px; height: 44px; }
}

.cell-input {
  width: 100%;
  border: none;
  background: transparent;
  padding: var(--space-3) var(--space-3);
  font-size: var(--text-base);
  color: var(--fg-primary);
  border-radius: var(--radius-sm);
}
tr:hover .cell-input { background: var(--bg-surface); }
.cell-input:focus {
  outline: none;
  box-shadow: inset 0 0 0 2px var(--focus-ring);
  background: var(--bg-page);
  position: relative;
  z-index: 1;
}
.cell-input.dirty { background: var(--bg-warm); }
tr:hover .cell-input.dirty { background: var(--color-sand-light); }

.cell-input-readonly {
  color: var(--fg-tertiary);
  cursor: default;
}
.cell-input-readonly:focus { box-shadow: none; }

.row-actions-col { width: 76px; min-width: 76px; }
td.row-actions-col, th.row-actions-col { text-align: center; }
td.row-actions-col { padding: 0 var(--space-2); white-space: nowrap; }
td.row-actions-col .icon-btn + .icon-btn { margin-left: var(--space-1); }

/* Amplades específiques per a la taula simplificada de "Preus per dia"
   (vegeu COLUMN_WIDTH_CLASSES a state.js): DATA és una descripció
   llarga, MÍN/PREU/P/Any són valors curts. */
.col-wide { min-width: 320px; }
.col-narrow { width: 90px; min-width: 90px; }

/* ---------------------------------------------------------
   Empty & skeleton states
   --------------------------------------------------------- */
.empty-row td {
  padding: var(--space-6);
  text-align: center;
  color: var(--fg-tertiary);
  font-size: var(--text-md);
  border-right: none;
}

.skeleton-cell {
  height: 1rem;
  margin: var(--space-3);
  border-radius: var(--radius-sm);
  background: linear-gradient(90deg, var(--bg-surface) 25%, var(--color-divider) 37%, var(--bg-surface) 63%);
  background-size: 400% 100%;
  animation: shimmer 1.4s ease infinite;
}
@keyframes shimmer {
  0% { background-position: 100% 50%; }
  100% { background-position: 0 50%; }
}
@media (prefers-reduced-motion: reduce) {
  .skeleton-cell { animation: none; background: var(--bg-surface); }
}
/* ---------------------------------------------------------
   Modal — formulari de nova fila (base: capçalera, progrés, camps)
   --------------------------------------------------------- */
.modal {
  border: none;
  border-radius: var(--radius-md);
  padding: 0;
  width: min(480px, calc(100vw - var(--space-6) * 2));
  box-shadow: 0 12px 32px rgba(28, 28, 26, 0.18);
  transition: width var(--duration) var(--ease-out);
}

.modal.modal-wide {
  width: min(720px, calc(100vw - var(--space-6) * 2));
}

.modal::backdrop {
  background: rgba(28, 28, 26, 0.35);
}

.modal-header {
  padding: var(--space-5) var(--space-6) var(--space-4);
  border-bottom: 1px solid var(--border-default);
}

.modal-title {
  margin: 0;
  font-family: var(--font-display);
  font-weight: 500;
  font-style: italic;
  font-size: var(--text-display);
  color: var(--fg-primary);
}

.modal-step {
  margin: var(--space-1) 0 0;
  font-size: var(--text-sm);
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--fg-tertiary);
}
.modal-step:empty { display: none; }

.modal-progress {
  margin-top: var(--space-3);
  height: 3px;
  border-radius: var(--radius-pill);
  background: var(--color-divider);
  overflow: hidden;
}

.modal-progress-fill {
  height: 100%;
  background: var(--color-charcoal);
  border-radius: var(--radius-pill);
  transition: width 220ms var(--ease-out);
}

.modal-fields {
  display: flex;
  flex-direction: column;
  gap: var(--space-4);
  padding: var(--space-5) var(--space-6);
  max-height: 60vh;
  overflow-y: auto;
}

.modal-fields.is-entering {
  animation: modalFieldsIn 200ms var(--ease-out);
}
@keyframes modalFieldsIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: none; }
}
@media (prefers-reduced-motion: reduce) {
  .modal-fields.is-entering { animation: none; }
}

.modal-field label {
  display: block;
  font-size: var(--text-sm);
  font-weight: 600;
  color: var(--fg-secondary);
  margin-bottom: var(--space-2);
}

.modal-field-required { color: var(--color-danger); }

/* Icona ⓘ d'ajuda al costat del nom del camp: mateixa vinyeta fosca
   que la resta de tooltips de l'app (vegeu [data-tooltip]::before a
   layout.css), a la dreta perquè no quedi tallada pel scroll vertical
   de .modal-fields. */
.field-help-icon {
  position: relative;
  display: inline-flex;
  vertical-align: middle;
  margin-left: var(--space-1);
  color: var(--fg-tertiary);
  cursor: help;
}
.field-help-icon:hover,
.field-help-icon:focus-visible { color: var(--fg-primary); }
.field-help-icon:focus-visible {
  outline: 2px solid var(--focus-ring);
  outline-offset: 2px;
  border-radius: 50%;
}
.field-help-icon[data-tooltip]::before {
  left: calc(100% + var(--space-2));
  top: 50%;
  max-width: 220px;
  font-weight: 400;
  transform: translateY(-50%) translateX(-4px);
}
.field-help-icon[data-tooltip]:hover::before,
.field-help-icon[data-tooltip]:focus-visible::before {
  transform: translateY(-50%) translateX(0);
}

.modal-field-error {
  display: none;
  margin: var(--space-1) 0 0;
  font-size: var(--text-xs);
  color: var(--color-danger);
}
.modal-field.is-invalid .modal-field-error { display: block; }

.modal-field.is-invalid input,
.modal-field.is-invalid .multiselect-trigger {
  border-color: var(--color-danger);
}
.modal-field.is-invalid .currency-suffix { color: var(--color-danger); }

.modal-field input {
  width: 100%;
  border: 1px solid var(--border-default);
  border-radius: var(--radius-sm);
  padding: var(--space-2) var(--space-3);
  font-size: var(--text-base);
  color: var(--fg-primary);
  background: var(--bg-page);
}

.modal-field input:hover { border-color: var(--color-sand-dark); }
.modal-field input:focus {
  outline: none;
  border-color: var(--focus-ring);
  box-shadow: inset 0 0 0 1px var(--focus-ring);
}

.modal-field-readonly input {
  background: var(--bg-surface);
  color: var(--fg-tertiary);
  cursor: default;
}
.modal-field-readonly input:hover { border-color: var(--border-default); }
.modal-field-readonly input:focus { box-shadow: none; }

.modal-actions {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: var(--space-2);
  padding: var(--space-4) var(--space-6) var(--space-5);
  border-top: 1px solid var(--border-default);
}

.modal-actions-spacer { flex: 1; }
/* ---------------------------------------------------------
   Multiselecció / uniselecció (Masia, Any, Unit, Dia, Mes...)
   --------------------------------------------------------- */
.multiselect {
  position: relative;
}

.multiselect-trigger {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  width: 100%;
  text-align: left;
  border: 1px solid var(--border-default);
  border-radius: var(--radius-sm);
  padding: var(--space-2) var(--space-3);
  font-size: var(--text-base);
  color: var(--fg-primary);
  background: var(--bg-page);
  cursor: pointer;
}
.multiselect-trigger-label {
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.multiselect-trigger-dots {
  display: flex;
  align-items: center;
  gap: 4px;
  flex-shrink: 0;
}
.multiselect-trigger-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  border: 1px solid var(--dot-border);
  flex-shrink: 0;
}
.multiselect-trigger-chevron {
  flex-shrink: 0;
  display: inline-flex;
  color: var(--fg-tertiary);
  transition: transform var(--duration) var(--ease-out);
}
.multiselect-trigger.is-open .multiselect-trigger-chevron { transform: rotate(180deg); }

  height: 1px;

.calendar-picker-card {

  <script>

// Nom de la columna d'identificador autogenerat (mateixa lògica que

// mínim de convidats i el preu, diferents a cada full de calendari.
// preuComp (preu compensat) només existeix a "Preus menu".
const CALENDAR_COLUMNS_BY_SHEET = {
  'PreusMenu': { min: 'MÍN', preuP: 'PREU/P', preuComp: 'PreuComp' },
  'Coctel': { min: 'MinConvidats', preuP: 'PreuPersona', preuComp: null },
};

// Columnes que es veuen a la taula de cada full quan la casella
// "Simplifica" està activada (per defecte ho està). Els fulls que no
// hi surten no tenen aquesta casella.
const SIMPLIFY_TABLE_COLUMNS_BY_SHEET = {
  'PreusMenu': ['DATA', 'MÍN', 'PREU/P', 'Masia', 'Any'],
  'Hoja 1': ['Nom Servei', 'Masia', 'Any', 'Preu'],
  'Coctel': ['Masia', 'Any', 'Dia', 'Mes', 'MinConvidats', 'PreuPersona', 'PenalitzacioPerPersona'],
  'CoctelExtres': ['Nom Servei', 'Masia', 'Any', 'PreuPersona'],
};
function isSimplifiableSheet(sheetName) {
  return Object.prototype.hasOwnProperty.call(SIMPLIFY_TABLE_COLUMNS_BY_SHEET, sheetName);
}
function getSimplifyColumns(sheetName) {
  return SIMPLIFY_TABLE_COLUMNS_BY_SHEET[sheetName] || [];
}

// Classe CSS per amplada de columna (vegeu css/table.css): DATA
// necessita més espai (és una descripció, no un valor curt), MÍN/PREU/P/
// Any en necessiten menys.
const COLUMN_WIDTH_CLASSES = {
  'DATA': 'col-wide',
  'MÍN': 'col-narrow',
  'PREU/P': 'col-narrow',
  'Any': 'col-narrow',
  'MinConvidats': 'col-narrow',
  'PreuPersona': 'col-narrow',
  'PenalitzacioPerPersona': 'col-narrow',
  'MinimEuros': 'col-narrow',
};
function columnClassFor(header) {
  return COLUMN_WIDTH_CLASSES[header] || null;
}

const state = {
  sheets: [],
  currentName: null,
  headers: [],
  rows: [],
  loaded: false,
  filterMasia: [],
  filterAny: [],
  filterDia: [],
  filterMes: [],
  simplifyTable: true,
  sortColIndex: -1,
  sortDirection: 'asc',
  view: 'table',
  // 'years' (3 targetes d'any) → 'months' (12 targetes d'aquell any) →
  // 'month' (el calendari d'un mes concret, la vista de sempre).
  calendarLevel: 'years',
  calendarYear: null,
  calendarRefDate: new Date(),
  // Cau de dades ja carregades per full (nom -> {headers, rows}), perquè
  // canviar de pestanya no obligui a tornar a demanar-les al servidor.
  sheetCache: {},
};

// Cert si la fila conté algun dels valors seleccionats a la columna
// colIndex (la cel·la es divideix per comes, ja que una mateixa fila
// pot aplicar a diverses masies/anys/dies/mesos alhora). Sense
// selecció, o sense columna, no filtra res.
// options.emptyMeansAll: una cel·la buida es considera "aplica a tot"
// (cas de Dia/Mes al full "Preus per dia": buit = tots els dies/mesos).
// options.normalize: compara els valors normalitzats en lloc del text
// literal (calen per a Dia, on "Dissabte"/"Dissabtes" han de coincidir).
function rowMatchesValueFilter(row, colIndex, selectedValues, options) {
  options = options || {};
  if (!selectedValues.length || colIndex === -1) return true;
  const raw = String(row[colIndex] || '').trim();
  if (!raw) return Boolean(options.emptyMeansAll);
  const cellParts = raw.split(',').map(function (part) { return part.trim(); });
  if (options.normalize) {
    const normalizedSelected = selectedValues.map(options.normalize);
    return cellParts.some(function (part) { return normalizedSelected.indexOf(options.normalize(part)) !== -1; });
  }
  return selectedValues.some(function (value) { return cellParts.indexOf(value) !== -1; });
}

var DIACRITICS_RE = new RegExp('[̀-ͯ]', 'g');
function normalizeText(value) {
  return String(value == null ? '' : value)
    .normalize('NFD')
    .replace(DIACRITICS_RE, '')
    .toLowerCase();
}

// Ordenació "com a l'Excel": si tots dos valors semblen un número
// (fins i tot formatats com "790,00 €"), es comparen numèricament;
// si no, com a text (ignorant accents/majúscules).
function parseSortableNumber(raw) {
  const str = String(raw == null ? '' : raw).trim();
  if (!str) return null;
  const cleaned = str.replace(/[^\d,.\-]/g, '');
  if (!cleaned) return null;
  const normalized = cleaned.indexOf(',') !== -1 ? cleaned.replace(/\./g, '').replace(',', '.') : cleaned;
  const num = Number(normalized);
  return isNaN(num) ? null : num;
}

function compareForSort(a, b) {
  const numA = parseSortableNumber(a);
  const numB = parseSortableNumber(b);
  if (numA !== null && numB !== null) return numA - numB;
  return normalizeText(a).localeCompare(normalizeText(b), 'ca');
}

function padRow(row, width) {
  const copy = row.slice(0, width);
  while (copy.length < width) copy.push('');
  return copy;
}

function setStatus(message, type) {
  const el = document.getElementById('statusMsg');
  el.className = 'status' + (type ? ' is-' + type : '');
  el.innerHTML = (type === 'loading' || type === 'success' || type === 'error')
    ? '<span class="status-dot"></span><span>' + message + '</span>'
    : '<span>' + message + '</span>';
}

function onError(err) {
  setStatus(err && err.message ? err.message : String(err), 'error');
}
// Esquelet de càrrega i la construcció de la taula de dades pròpiament
// dita. La navegació (pestanyes, commutador de vista) viu a
// render-nav.js, els filtres a render-filters.js i la construcció de
// cada cel·la editable a render-cell.js.
function renderSkeleton(cols, rows) {
  const table = document.getElementById('dataTable');
  table.innerHTML = '';
  const tbody = document.createElement('tbody');
  for (let r = 0; r < rows; r++) {
    const tr = document.createElement('tr');
    for (let c = 0; c < Math.max(cols, 1); c++) {
      const td = document.createElement('td');
      const bar = document.createElement('div');
      bar.className = 'skeleton-cell';
      bar.style.width = (60 + ((r * 7 + c * 13) % 30)) + '%';
      td.appendChild(bar);
      tr.appendChild(td);
    }
    tbody.appendChild(tr);
  }
  table.appendChild(tbody);
}

function renderTable() {
  const table = document.getElementById('dataTable');
  table.innerHTML = '';

  const visibleColIndexes = getVisibleColIndexes();

  const thead = document.createElement('thead');
  const headRow = document.createElement('tr');

  const thActions = document.createElement('th');
  thActions.className = 'row-actions-col';
  headRow.appendChild(thActions);

  visibleColIndexes.forEach(function (colIndex) {
    const th = document.createElement('th');
    const colClass = columnClassFor(state.headers[colIndex]);
    if (colClass) th.classList.add(colClass);

    const wrap = document.createElement('button');
    wrap.type = 'button';
    wrap.className = 'header-cell';
    wrap.setAttribute('aria-label', 'Ordena per "' + state.headers[colIndex] + '"');

    const label = document.createElement('span');
    label.className = 'header-cell-label';
    label.textContent = state.headers[colIndex];
    wrap.appendChild(label);

    if (state.sortColIndex === colIndex) {
      const arrow = document.createElement('span');
      arrow.className = 'header-cell-sort-icon';
      arrow.innerHTML = ICONS.chevron;
      if (state.sortDirection === 'asc') arrow.classList.add('is-asc');
      wrap.appendChild(arrow);
    }

    wrap.addEventListener('click', function () {
      if (state.sortColIndex === colIndex) {
        state.sortDirection = state.sortDirection === 'asc' ? 'desc' : 'asc';
      } else {
        state.sortColIndex = colIndex;
        state.sortDirection = 'asc';
      }
      renderTable();
    });

    th.appendChild(wrap);
    headRow.appendChild(th);
  });

  thead.appendChild(headRow);
  table.appendChild(thead);

  const tbody = document.createElement('tbody');
  const masiaColIndex = state.headers.indexOf('Masia');
  const anyColIndex = state.headers.indexOf('Any');
  const diaColIndex = state.headers.indexOf('Dia');
  const mesColIndex = state.headers.indexOf('Mes');
  const visible = state.rows
    .map(function (row, rowIndex) { return { row: row, rowIndex: rowIndex }; })
    .filter(function (item) {
      if (!rowMatchesValueFilter(item.row, masiaColIndex, state.filterMasia)) return false;
      if (!rowMatchesValueFilter(item.row, anyColIndex, state.filterAny)) return false;
      // Dia/Mes buits al full = "s'aplica a tots els dies/mesos" (mateixa
      // regla que fa servir el calendari): una cel·la buida no s'exclou
      // encara que hi hagi un filtre actiu.
      if (!rowMatchesValueFilter(item.row, diaColIndex, state.filterDia, { emptyMeansAll: true, normalize: normalizeDiaForFilter })) return false;
      if (!rowMatchesValueFilter(item.row, mesColIndex, state.filterMes, { emptyMeansAll: true, normalize: normalizeText })) return false;
      return true;
    });

  if (state.sortColIndex !== -1) {
    const dir = state.sortDirection === 'desc' ? -1 : 1;
    const sortColIndex = state.sortColIndex;
    visible.sort(function (a, b) { return compareForSort(a.row[sortColIndex], b.row[sortColIndex]) * dir; });
  }

  if (!state.rows.length) {
    const tr = document.createElement('tr');
    tr.className = 'empty-row';
    const td = document.createElement('td');
    td.colSpan = visibleColIndexes.length + 1;
    td.textContent = 'Encara no hi ha cap fila. Clica "+ Fila" per afegir-ne la primera.';
    tr.appendChild(td);
    tbody.appendChild(tr);
  } else if (!visible.length) {
    const tr = document.createElement('tr');
    tr.className = 'empty-row';
    const td = document.createElement('td');
    td.colSpan = visibleColIndexes.length + 1;
    td.textContent = 'Cap fila coincideix amb els filtres seleccionats.';
    tr.appendChild(td);
    tbody.appendChild(tr);
  }

  visible.forEach(function (item) {
    const row = item.row;
    const rowIndex = item.rowIndex;
    const tr = document.createElement('tr');

    const tdActions = document.createElement('td');
    tdActions.className = 'row-actions-col';
    const dup = document.createElement('button');
    dup.type = 'button';
    dup.className = 'icon-btn';
    dup.dataset.tooltip = 'Duplica fila';
    dup.setAttribute('aria-label', 'Duplica la fila ' + (rowIndex + 1));
    dup.innerHTML = ICONS.duplicate;
    dup.addEventListener('click', function () { handleDuplicateRow(rowIndex); });
    tdActions.appendChild(dup);
    const del = document.createElement('button');
    del.type = 'button';
    del.className = 'icon-btn';
    del.dataset.tooltip = 'Esborra fila';
    del.setAttribute('aria-label', 'Esborra la fila ' + (rowIndex + 1));
    del.innerHTML = ICONS.trash;
    del.addEventListener('click', function () { handleDeleteRow(rowIndex); });
    tdActions.appendChild(del);
    tr.appendChild(tdActions);

    visibleColIndexes.forEach(function (colIndex) {
      const value = row[colIndex];
      const td = document.createElement('td');
      const colClass = columnClassFor(state.headers[colIndex]);
      if (colClass) td.classList.add(colClass);
      const control = buildTableCellControl(state.headers[colIndex], colIndex, rowIndex, value);
      getLabelableElement(control).setAttribute(
        'aria-label', (state.headers[colIndex] || 'Columna ' + (colIndex + 1)) + ', fila ' + (rowIndex + 1)
      );
      td.appendChild(control);
      tr.appendChild(td);
    });

    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
}
// Pestanyes de full, commutador Taula/Calendari, i el dispatcher que
// decideix quina vista (taula o calendari) i quin joc de filtres toca
// mostrar.
function renderTabs() {
  const nav = document.getElementById('tabs');
  nav.innerHTML = '';
  state.sheets.forEach(function (sheet) {
    const info = SHEET_INFO[sheet.name];
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (sheet.name === state.currentName ? ' active' : '');
    btn.type = 'button';
    btn.textContent = info ? info.label : sheet.name;
    if (info && info.hint) btn.dataset.tooltip = info.hint;
    btn.setAttribute('aria-selected', sheet.name === state.currentName ? 'true' : 'false');
    btn.addEventListener('click', function () {
      if (sheet.name === state.currentName) return;
      state.currentName = sheet.name;
      state.filterMasia = [];
      state.filterAny = [];
      state.filterDia = [];
      state.filterMes = [];
      state.sortColIndex = -1;
      state.sortDirection = 'asc';
      state.view = 'table';
      renderTabs();
      const cached = state.sheetCache[sheet.name];
      if (cached) {
        // Ja la tenim: es mostra a l'instant i es refresca en segon pla
        // per si el full de càlcul ha canviat mentrestant.
        applySheetData(cached);
        renderCurrentView();
        setStatus(state.rows.length + ' files carregades.', 'success');
        loadCurrentSheet(true);
      } else {
        renderSkeleton(state.headers.length || 3, 5);
        loadCurrentSheet();
      }
    });
    nav.appendChild(btn);
  });

  const hintEl = document.getElementById('sheetHint');
  const currentInfo = SHEET_INFO[state.currentName];
  hintEl.textContent = currentInfo ? currentInfo.hint : '';

  renderViewToggle();
}

// Commutador Taula/Calendari: només als fulls de CALENDAR_VIEW_SHEETS
// ("Preus menu" i "Còctel"). No depèn de les dades (a diferència dels
// filtres), es pot construir tan bon punt se sap quin full s'ha
// seleccionat.
function renderViewToggle() {
  const container = document.getElementById('viewToggle');
  container.innerHTML = '';
  container.hidden = !isCalendarViewSheet(state.currentName);
  if (container.hidden) return;

  [
    { view: 'table', label: 'Taula' },
    { view: 'calendar', label: 'Calendari' },
  ].forEach(function (opt) {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'btn view-toggle-btn' + (state.view === opt.view ? ' is-active' : '');
    btn.textContent = opt.label;
    btn.addEventListener('click', function () {
      if (state.view === opt.view) return;
      state.view = opt.view;
      if (opt.view === 'calendar') state.calendarLevel = 'years';
      renderViewToggle();
      renderCurrentView();
    });
    container.appendChild(btn);
  });
}

// Mostra la taula o el calendari segons state.view (només rellevant als
// fulls de CALENDAR_VIEW_SHEETS — a la resta sempre és la taula), i el
// joc de filtres corresponent (vegeu renderFilters a render-filters.js).
function renderCurrentView() {
  const isCalendar = state.view === 'calendar' && isCalendarViewSheet(state.currentName);
  document.getElementById('tableWrap').hidden = isCalendar;
  document.getElementById('calendarView').hidden = !isCalendar;
  renderFilters();
  renderSimplifyToggle();
  if (isCalendar) {
    renderCalendar();
  } else {
    renderTable();
  }
}
// Filtres de Dia/Mes/Masia/Any: neteja, construcció de cada desplegable
// i els dos jocs independents (taula i calendari) que en reutilitzen la
// mateixa lògica. La casella "Simplifica" i el càlcul de columnes
// visibles de la taula també viuen aquí.
function clearAllFilters() {
  state.filterDia = [];
  state.filterMes = [];
  state.filterMasia = [];
  state.filterAny = [];
  renderCurrentView();
}

function hasAnyFilterSelected() {
  return Boolean(state.filterDia.length || state.filterMes.length || state.filterMasia.length || state.filterAny.length);
}

// Colors d'opció per filtre, quan n'hi ha (vegeu getMasiaColor a
// calendar-colors.js i getYearRelativeColor a yearfield.js).
const FILTER_OPTION_COLORS = { 'Masia': getMasiaColor, 'Masies': getMasiaColor, 'Any': getYearRelativeColor };

function buildFilterField(def) {
  const colIndex = state.headers.indexOf(def.header);
  if (colIndex === -1) return null;

  const field = buildDropdownField(
    colIndex, def.selected.join(', '), getFixedOptionsForHeader(def.header) || getDistinctColumnValues(colIndex, true), true, 'tableFilter', def.header,
    FILTER_OPTION_COLORS[def.header]
  );
  field.classList.add('table-filter');
  const hiddenInput = field.querySelector('input[type="hidden"]');
  field.addEventListener('change', function () {
    def.apply(hiddenInput.value ? hiddenInput.value.split(',').map(function (v) { return v.trim(); }).filter(Boolean) : []);
    renderCurrentView();
  });
  return field;
}

// visible=false l'amaga sense treure-la del flux (visibility, no
// display), perquè els altres filtres no es reposicionin en aparèixer
// o desaparèixer el botó.
function buildClearFiltersButton(visible) {
  const btn = document.createElement('button');
  btn.type = 'button';
  btn.className = 'btn btn-ghost';
  btn.textContent = 'Neteja filtres';
  btn.addEventListener('click', clearAllFilters);
  if (!visible) {
    btn.style.visibility = 'hidden';
    btn.tabIndex = -1;
  }
  return btn;
}

// Dos jocs de filtres independents, cadascun amb el seu contenidor:
// la taula (Dia, Mes, Masia, Any — les columnes que existeixin al full
// actual) i el calendari (només Masia, ja que Dia/Mes/Any ja els tria
// la pròpia navegació any → mes → dia). Comparteixen l'estat
// (state.filterDia, etc.): un filtre aplicat des d'un dia del calendari
// (vegeu goToTableFilteredByDate) es veu reflectit en canviar a la taula.
function renderFilters() {
  const isCalendar = state.view === 'calendar' && isCalendarViewSheet(state.currentName);
  const showTableFilters = !isCalendar && (state.currentName === SERVICES_SHEET_NAME || state.currentName === CALENDAR_SHEET_NAME || state.currentName === COCTEL_SHEET_NAME);
  const showCalendarFilters = isCalendar;

  const tableContainer = document.getElementById('tableFilters');
  tableContainer.innerHTML = '';
  tableContainer.hidden = !showTableFilters;
  if (showTableFilters) {
    [
      { header: 'Dia', selected: state.filterDia, apply: function (values) { state.filterDia = values; } },
      { header: 'Mes', selected: state.filterMes, apply: function (values) { state.filterMes = values; } },
      { header: 'Masia', selected: state.filterMasia, apply: function (values) { state.filterMasia = values; } },
      { header: 'Any', selected: state.filterAny, apply: function (values) { state.filterAny = values; } },
    ].forEach(function (def) {
      const field = buildFilterField(def);
      if (field) tableContainer.appendChild(field);
    });
    tableContainer.appendChild(buildClearFiltersButton(hasAnyFilterSelected()));
  }

  const calendarContainer = document.getElementById('calendarFilters');
  calendarContainer.innerHTML = '';
  calendarContainer.hidden = !showCalendarFilters;
  if (showCalendarFilters) {
    const masiaField = buildFilterField(
      { header: 'Masia', selected: state.filterMasia, apply: function (values) { state.filterMasia = values; } }
    );
    if (masiaField) calendarContainer.appendChild(masiaField);
    calendarContainer.appendChild(buildClearFiltersButton(Boolean(state.filterMasia.length)));
  }
}

// Casella "Simplifica": només als fulls d'SIMPLIFY_TABLE_COLUMNS_BY_SHEET
// (vegeu state.js). Quan està activada (per defecte), la taula només
// mostra les columnes d'aquell full; desactivada, totes les columnes.
function renderSimplifyToggle() {
  const wrap = document.getElementById('simplifyToggle');
  wrap.hidden = !(isSimplifiableSheet(state.currentName) && state.view === 'table');
}

function getVisibleColIndexes() {
  const simplifying = isSimplifiableSheet(state.currentName) && state.view === 'table' && state.simplifyTable;
  const columns = getSimplifyColumns(state.currentName);
  return state.headers
    .map(function (label, colIndex) { return { label: label, colIndex: colIndex }; })
    .filter(function (item) { return !simplifying || columns.indexOf(item.label) !== -1; })
    .map(function (item) { return item.colIndex; });
}
// Construcció del camp d'edició d'una cel·la de la taula (mateix
// component que el formulari "+ Fila" per a les columnes que ja hi són
// desplegable/casella/moneda) i el desat immediat en canviar-lo.
const CELL_OPTION_COLORS = { 'Masia': getMasiaColor, 'Masies': getMasiaColor, 'Any': getYearRelativeColor };

// Construeix el mateix tipus de camp que el formulari de "+ Fila" per
// editar una cel·la ja existent (desplegable, casella, moneda...) en
// lloc d'un text lliure, per a les columnes que ja són d'aquest tipus
// al modal. idPrefix inclou la fila perquè cada control tingui un id
// únic (una mateixa columna es repeteix a totes les files).
function buildTableCellControl(header, colIndex, rowIndex, value) {
  const idPrefix = 'tableCellR' + rowIndex + '_';

  if (isIdHeader(header) || isDataHeader(header)) {
    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'cell-input cell-input-readonly';
    input.value = value;
    input.readOnly = true;
    return input;
  }

  let control;
  if (MULTISELECT_HEADERS.indexOf(header) !== -1) {
    control = buildMultiselectField(colIndex, value, getFixedOptionsForHeader(header) || undefined, idPrefix, CELL_OPTION_COLORS[header]);
  } else if (header === YEAR_HEADER) {
    control = buildYearField(colIndex, value, idPrefix, CELL_OPTION_COLORS[header]);
  } else if (SELECT_HEADERS.indexOf(header) !== -1) {
    control = buildSelectField(colIndex, value, undefined, idPrefix);
  } else if (CHECKBOX_HEADERS.indexOf(header) !== -1) {
    control = buildCheckboxField(colIndex, value, idPrefix);
  } else {
    // Els camps de moneda (Preu, Llindà preu X<0, Llindà preu 0<X) es
    // mantenen com a text pla a la taula (com PREU/P a "Preus per dia"):
    // el camp numèric amb "€" només és útil en crear una fila nova
    // (formulari "+ Fila"), no per veure un valor ja formatat pel Sheet.
    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'cell-input';
    input.value = value;
    input.dataset.original = value;
    input.dataset.colIndex = String(colIndex);
    input.addEventListener('input', function () { input.classList.add('dirty'); });
    control = input;
  }

  control.addEventListener('change', function () {
    const newValue = getCellControlValue(control);
    saveTableCell(rowIndex, colIndex, newValue, function () { renderTable(); }, function () {
      if (control.dataset) { control.dataset.original = newValue; }
      control.classList.remove('dirty');
    });
  });
  return control;
}

// L'element que ha de rebre l'aria-label: el botó visible (desplegable)
// o l'input real (text/moneda/casella), mai el <input type="hidden">
// intern d'un desplegable.
function getLabelableElement(control) {
  const trigger = control.querySelector && control.querySelector('.multiselect-trigger');
  if (trigger) return trigger;
  if (control.matches && control.matches('[data-col-index]')) return control;
  const inner = control.querySelector && control.querySelector('[data-col-index]');
  return inner || control;
}

// Llegeix el valor actual d'un control, sigui un <input> directe o un
// embolcall (moneda/casella/desplegable) amb l'input real a dins.
function getCellControlValue(control) {
  const el = (control.matches && control.matches('[data-col-index]')) ? control : control.querySelector('[data-col-index]');
  if (!el) return '';
  return el.type === 'checkbox' ? (el.checked ? 'TRUE' : 'FALSE') : el.value;
}

function saveTableCell(rowIndex, colIndex, newValue, onRevert, onSuccess) {
  const original = state.rows[rowIndex][colIndex];
  if (newValue === original) return;
  setStatus('Desant...', 'loading');
  google.script.run
    .withSuccessHandler(function (result) {
      state.rows[rowIndex][colIndex] = newValue;
      // En editar Dia/Mes/Excepte, el backend recalcula "DATA" per a
      // aquesta fila i en retorna el nou text: cal reflectir-ho aquí
      // (i tornar a pintar la taula, ja que "DATA" pot estar visible).
      const dataChanged = result && typeof result.dataColIndex === 'number';
      if (dataChanged) state.rows[rowIndex][result.dataColIndex] = result.dataText;
      setStatus('Desat.', 'success');
      if (onSuccess) onSuccess();
      if (dataChanged) renderTable();
    })
    .withFailureHandler(function (err) {
      if (onRevert) onRevert();
      onError(err);
    })
    .updateCell(state.currentName, rowIndex, colIndex, newValue);
}
// Regles i dades del full "Preus per dia" (PreusMenu). Cada fila NO és
// un dia concret: és una regla recurrent ("Dissabtes de Juny, Juliol,
// Setembre i Octubre", Masia, Any) que s'aplica a tots els dies del mes
// indicat que cauen en aquell dia de la setmana, per aquell any concret,
// excepte el dia (o dies) que indiqui "Excepte". La construcció de la
// interfície (dies, targetes d'any/mes...) viu a calendar-nav.js,
// calendar-day.js, calendar-legend.js i calendar-views.js.
const MONTH_NAMES_CA = [
  'Gener', 'Febrer', 'Març', 'Abril', 'Maig', 'Juny',
  'Juliol', 'Agost', 'Setembre', 'Octubre', 'Novembre', 'Desembre',
];
const WEEKDAY_HEADER_NAMES_CA = ['Dl', 'Dt', 'Dc', 'Dj', 'Dv', 'Ds', 'Dg'];

// Llista fixa dels 7 dies (com MASIA_OPTIONS per a Masia): opcions dels
// desplegables de la columna "Dia" a tots els fulls, en lloc de derivar-
// les només dels valors que ja existeixen en aquell full concret.
const WEEKDAY_OPTIONS_CA = ['Dilluns', 'Dimarts', 'Dimecres', 'Dijous', 'Divendres', 'Dissabte', 'Diumenge'];

// Alguns dies de la setmana en català varien en singular/plural (les
// columnes fan servir totes dues formes indistintament: "Dissabte" i
// "Dissabtes"). 0 = diumenge, igual que Date#getDay().
const WEEKDAY_ALIASES_CA = {
  diumenge: 0, diumenges: 0,
  dilluns: 1,
  dimarts: 2,
  dimecres: 3,
  dijous: 4,
  divendres: 5,
  dissabte: 6, dissabtes: 6,
};

function normalizeWeekdayName(raw) {
  const key = normalizeText(raw).trim();
  return Object.prototype.hasOwnProperty.call(WEEKDAY_ALIASES_CA, key) ? WEEKDAY_ALIASES_CA[key] : null;
}

// Per filtrar la taula per "Dia": "Dissabte" i "Dissabtes" han de
// comptar com el mateix valor (a diferència d'una comparació de text
// literal). Es fa servir tant aquí com a render.js.
function normalizeDiaForFilter(raw) {
  const weekdayIndex = normalizeWeekdayName(raw);
  return weekdayIndex === null ? normalizeText(raw) : String(weekdayIndex);
}

// Busca, entre els valors reals que ja existeixen a una columna, el
// primer que normalitzat coincideixi amb el valor buscat — perquè el
// filtre que s'aplica en clicar un dia del calendari faci servir
// exactament el mateix text que ja hi ha al full (i el desplegable el
// mostri marcat), no un nom "canònic" inventat.
function findMatchingLiteralOption(colIndex, splitCombined, normalizeFn, targetNormalized) {
  if (colIndex === -1) return null;
  const options = getDistinctColumnValues(colIndex, splitCombined);
  for (let i = 0; i < options.length; i++) {
    if (normalizeFn(options[i]) === targetNormalized) return options[i];
  }
  return null;
}

// Dates conegudes que la columna "Excepte" sol fer servir com a nom en
// lloc d'una data. És una llista tancada: un text d'excepció no
// reconegut simplement no exclou cap dia (es podria ampliar aquí si
// n'apareixen més al full).
const KNOWN_EXCEPTION_DATES_CA = {
  "cap d'any": { month: 11, day: 31 },
  'any nou': { month: 0, day: 1 },
  'reis': { month: 0, day: 6 },
  'nadal': { month: 11, day: 25 },
  'sant esteve': { month: 11, day: 26 },
};

// Treu ",00" o ".00" d'un preu ja formatat pel Sheet (p.ex. "154,00 €"
// → "154 €"): només al calendari, no toca el valor real de la cel·la.
function formatPriceNoDecimals(raw) {
  return String(raw == null ? '' : raw).replace(/[.,]00(?=\s|€|$)/g, '');
}

function isExceptedDate(exceptionText, cellDate) {
  if (!exceptionText) return false;
  return String(exceptionText).split(',').some(function (part) {
    const known = KNOWN_EXCEPTION_DATES_CA[normalizeText(part).trim()];
    return known && cellDate.getMonth() === known.month && cellDate.getDate() === known.day;
  });
}

function getCalendarColIndexes() {
  const priceCols = CALENDAR_COLUMNS_BY_SHEET[state.currentName] || {};
  return {
    dia: state.headers.indexOf('Dia'),
    mes: state.headers.indexOf('Mes'),
    excepte: state.headers.indexOf('Excepte'),
    masia: state.headers.indexOf('Masia'),
    any: state.headers.indexOf('Any'),
    min: state.headers.indexOf(priceCols.min || 'MÍN'),
    preuP: state.headers.indexOf(priceCols.preuP || 'PREU/P'),
    preuComp: priceCols.preuComp ? state.headers.indexOf(priceCols.preuComp) : -1,
  };
}

// Files del full actual que compleixen els filtres de Masia/Any ja
// existents a la barra d'eines (es reutilitzen tal qual).
function getCalendarRows() {
  const masiaColIndex = state.headers.indexOf('Masia');
  const anyColIndex = state.headers.indexOf('Any');
  return state.rows.filter(function (row) {
    return rowMatchesValueFilter(row, masiaColIndex, state.filterMasia)
      && rowMatchesValueFilter(row, anyColIndex, state.filterAny);
  });
}

function ruleAppliesToDate(row, cols, cellDate) {
  if (String(row[cols.any] || '').trim() !== String(cellDate.getFullYear())) return false;

  // Cel·la buida = s'aplica a tots els dies de la setmana / mesos.
  // "Dia" pot llistar-ne diversos separats per comes (igual que "Mes").
  const diaRaw = String(row[cols.dia] || '').trim();
  if (diaRaw) {
    const weekdays = diaRaw.split(',').map(function (part) { return normalizeWeekdayName(part); });
    if (weekdays.indexOf(cellDate.getDay()) === -1) return false;
  }

  const mesRaw = String(row[cols.mes] || '').trim();
  if (mesRaw) {
    const months = mesRaw.split(',').map(function (part) { return normalizeText(part).trim(); }).filter(Boolean);
    if (months.indexOf(normalizeText(MONTH_NAMES_CA[cellDate.getMonth()])) === -1) return false;
  }

  if (isExceptedDate(row[cols.excepte], cellDate)) return false;

  return true;
}
// Color i ordre fixos per masia (per nom, no per ordre alfabètic de les
// dades): les que no coincideixen amb cap d'aquestes es pinten amb
// --masia-default i van al final. Els colors viuen a variables.css
// (--masia-*), no aquí, perquè quedin dins el sistema de tokens.
const MASIA_COLOR_RULES = [
  { match: 'Alzina', color: 'var(--masia-alzina)' },
  { match: 'Macià', color: 'var(--masia-macia)' },
  { match: 'Tous', color: 'var(--masia-tous)' },
  { match: 'Vivencs', color: 'var(--masia-vivencs)' },
];

// Llista fixa de les 4 masies: es fa servir com a opcions de tots els
// desplegables "Masia"/"Masies" (filtres, taula i formulari "+ Fila"),
// en lloc de derivar-les només dels valors que ja existeixen en aquell
// full concret — així un full nou o amb poques files ja les mostra totes.
const MASIA_OPTIONS = ["Ca n'Alzina", 'Castell de Tous', 'Can Macià', 'Mas Vivencs'];

// Retorna la llista fixa d'opcions per a les capçaleres que en tenen
// una (Masia/Masies, Dia, Mes), o null si la capçalera no en té —
// en aquest cas cal seguir derivant-les dels valors ja presents al full.
function getFixedOptionsForHeader(header) {
  if (header === 'Masia' || header === 'Masies') return MASIA_OPTIONS;
  if (header === 'Dia') return WEEKDAY_OPTIONS_CA;
  if (header === 'Mes') return MONTH_NAMES_CA;
  return null;
}

function getMasiaColor(masiaName) {
  const rule = MASIA_COLOR_RULES.find(function (r) { return masiaName && masiaName.indexOf(r.match) !== -1; });
  return rule ? rule.color : 'var(--masia-default)';
}

function getMasiaSortRank(masiaName) {
  const index = MASIA_COLOR_RULES.findIndex(function (r) { return masiaName && masiaName.indexOf(r.match) !== -1; });
  return index === -1 ? MASIA_COLOR_RULES.length : index;
}

function sortMasiaNames(names) {
  return names.slice().sort(function (a, b) {
    const rankDiff = getMasiaSortRank(a) - getMasiaSortRank(b);
    return rankDiff !== 0 ? rankDiff : a.localeCompare(b, 'ca');
  });
}
// Navegació del calendari: enllaç "enrere" (torna al nivell anterior)
// i la capçalera de mes (fletxes anterior/següent + "Avui").
function buildCalendarBackLink(label, onClick) {
  const back = document.createElement('button');
  back.type = 'button';
  back.className = 'calendar-back-link';
  back.innerHTML = ICONS.chevron + '<span>' + label + '</span>';
  back.addEventListener('click', onClick);
  return back;
}

function buildCalendarHeader(year, month) {
  const header = document.createElement('div');
  header.className = 'calendar-header';

  const prevBtn = document.createElement('button');
  prevBtn.type = 'button';
  prevBtn.className = 'icon-btn calendar-nav-btn calendar-nav-prev';
  prevBtn.innerHTML = ICONS.chevron;
  prevBtn.setAttribute('aria-label', 'Mes anterior');
  prevBtn.addEventListener('click', function () {
    state.calendarRefDate = new Date(year, month - 1, 1);
    renderCalendar();
  });

  const title = document.createElement('h2');
  title.className = 'calendar-title';
  title.textContent = MONTH_NAMES_CA[month] + ' ' + year;

  const nextBtn = document.createElement('button');
  nextBtn.type = 'button';
  nextBtn.className = 'icon-btn calendar-nav-btn calendar-nav-next';
  nextBtn.innerHTML = ICONS.chevron;
  nextBtn.setAttribute('aria-label', 'Mes següent');
  nextBtn.addEventListener('click', function () {
    state.calendarRefDate = new Date(year, month + 1, 1);
    renderCalendar();
  });

  const todayBtn = document.createElement('button');
  todayBtn.type = 'button';
  todayBtn.className = 'btn btn-ghost calendar-today-btn';
  todayBtn.textContent = 'Avui';
  todayBtn.addEventListener('click', function () {
    state.calendarRefDate = new Date();
    state.calendarLevel = 'month';
    renderCalendar();
  });

  header.appendChild(prevBtn);
  header.appendChild(title);
  header.appendChild(nextBtn);
  header.appendChild(todayBtn);
  return header;
}
// Construcció d'una cel·la de dia del calendari i el clic que porta a
// la taula filtrada per aquell dia.
function buildCalendarDayCell(cellDate, matches, cols, isToday) {
  // Dies sense preu són un <div> merament informatiu; dies amb preu són
  // un <button> real: cal poder-los activar per teclat/tàctil per veure
  // el detall complet quan queda tallat per l'el·lipsi (vegeu més avall
  // .is-expanded), no només amb el hover del "title".
  const cell = document.createElement(matches.length ? 'button' : 'div');
  if (matches.length) cell.type = 'button';
  cell.className = 'calendar-day' + (matches.length ? ' has-price' : '') + (isToday ? ' is-today' : '');

  const dayNumber = document.createElement('span');
  dayNumber.className = 'calendar-day-number';
  dayNumber.textContent = String(cellDate.getDate());
  cell.appendChild(dayNumber);

  if (!matches.length) return cell;

  // Una mateixa fila pot cobrir diverses masies alhora (cel·la separada
  // per comes): es mostra una línia (punt de color + tota la info) per
  // masia, no per fila. Si hi ha un filtre de Masia actiu, només es
  // mostren (i compten com a "coincidència") les masies seleccionades,
  // encara que la fila també en cobreixi d'altres.
  const entriesByMasia = [];
  const seenMasia = {};
  matches.forEach(function (row) {
    const raw = cols.masia !== -1 ? String(row[cols.masia] || '') : '';
    (raw ? raw.split(',') : ['']).forEach(function (part) {
      const name = part.trim();
      if (seenMasia[name]) return;
      if (state.filterMasia.length && name && state.filterMasia.indexOf(name) === -1) return;
      seenMasia[name] = true;
      entriesByMasia.push({ name: name, row: row });
    });
  });
  entriesByMasia.sort(function (a, b) { return getMasiaSortRank(a.name) - getMasiaSortRank(b.name); });

  const priceList = document.createElement('div');
  priceList.className = 'calendar-day-prices';
  entriesByMasia.forEach(function (entry) {
    const line = document.createElement('div');
    line.className = 'calendar-day-price-line';

    const dot = document.createElement('span');
    dot.className = 'calendar-day-dot';
    dot.style.background = getMasiaColor(entry.name);
    line.appendChild(dot);

    const details = document.createElement('span');
    details.className = 'calendar-day-price-details';

    if (cols.preuP !== -1 && entry.row[cols.preuP]) {
      const priceEl = document.createElement('span');
      priceEl.className = 'calendar-day-price';
      priceEl.textContent = formatPriceNoDecimals(entry.row[cols.preuP]);
      details.appendChild(priceEl);
    }

    const metaParts = [];
    if (cols.min !== -1 && entry.row[cols.min]) metaParts.push('m ' + entry.row[cols.min]);
    if (cols.preuComp !== -1 && entry.row[cols.preuComp]) metaParts.push('c ' + formatPriceNoDecimals(entry.row[cols.preuComp]));
    if (metaParts.length) {
      const metaEl = document.createElement('span');
      metaEl.className = 'calendar-day-price-meta';
      metaEl.textContent = ' · ' + metaParts.join(' · ');
      details.appendChild(metaEl);
    }

    line.appendChild(details);
    priceList.appendChild(line);
  });
  cell.appendChild(priceList);

  const fullDetail = entriesByMasia.map(function (entry) {
    const parts = [];
    if (entry.name) parts.push(entry.name);
    if (cols.preuP !== -1 && entry.row[cols.preuP]) parts.push(formatPriceNoDecimals(entry.row[cols.preuP]) + '/persona');
    if (cols.min !== -1 && entry.row[cols.min]) parts.push('mín. ' + entry.row[cols.min]);
    if (cols.preuComp !== -1 && entry.row[cols.preuComp]) parts.push('preu compensat: ' + formatPriceNoDecimals(entry.row[cols.preuComp]));
    return parts.join(' — ');
  }).join('. ');

  // Sense "title": la informació ja es veu directament a la cel·la, un
  // tooltip redundant en passar el ratolí només molestava. L'aria-label
  // manté el detall complet (mai truncat) accessible a lectors de
  // pantalla independentment del clic.
  const dayLabel = 'Dia ' + cellDate.getDate() + ': ' + fullDetail + '. Clica per veure aquestes files a la taula.';
  cell.setAttribute('aria-label', dayLabel);
  cell.addEventListener('click', function () { goToTableFilteredByDate(cellDate, matches, cols); });

  return cell;
}

// En clicar un dia del calendari, es passa a la vista de taula amb els
// filtres de Dia/Mes/Masia/Any ajustats a aquell dia concret (Dia/Mes
// només si hi ha, entre les opcions reals del full, un valor que hi
// correspongui — si la regla s'aplica "a tots els dies/mesos", es
// deixa sense filtrar per no amagar-la).
function goToTableFilteredByDate(cellDate, matches, cols) {
  const weekdayTarget = String(cellDate.getDay());
  const monthTarget = normalizeText(MONTH_NAMES_CA[cellDate.getMonth()]);

  const diaOption = findMatchingLiteralOption(cols.dia, true, normalizeDiaForFilter, weekdayTarget);
  const mesOption = findMatchingLiteralOption(cols.mes, true, normalizeText, monthTarget);

  const masiaNames = [];
  matches.forEach(function (row) {
    const raw = cols.masia !== -1 ? String(row[cols.masia] || '') : '';
    raw.split(',').forEach(function (part) {
      const name = part.trim();
      if (name && masiaNames.indexOf(name) === -1) masiaNames.push(name);
    });
  });

  state.filterDia = diaOption ? [diaOption] : [];
  state.filterMes = mesOption ? [mesOption] : [];
  state.filterMasia = masiaNames;
  state.filterAny = [String(cellDate.getFullYear())];
  state.view = 'table';

  renderViewToggle();
  renderCurrentView();
}
// Llegenda de masies del mes visible, i el càlcul de quines masies
// tenen dades per a un any/mes concret (per pintar els punts a les
// targetes del selector any → mes).
function buildCalendarLegend(masiaNames) {
  if (masiaNames.length < 2) return null;
  const legend = document.createElement('div');
  legend.className = 'calendar-legend';
  sortMasiaNames(masiaNames).forEach(function (masiaName) {
    const item = document.createElement('span');
    item.className = 'calendar-legend-item';
    const dot = document.createElement('span');
    dot.className = 'calendar-day-dot';
    dot.style.background = getMasiaColor(masiaName);
    item.appendChild(dot);
    item.appendChild(document.createTextNode(masiaName));
    legend.appendChild(item);
  });
  return legend;
}

// Noms de masia (individuals, ja separats per comes) amb alguna fila
// que cobreixi aquest any — es fan servir per pintar-ne els punts a la
// targeta en lloc d'un recompte de files. "rows" ja filtrades es passa
// des de fora perquè renderCalendarYears/Months no torni a recórrer
// tot state.rows a cada targeta (3, o 12 cops per als mesos).
function getMasiaNamesForYear(rows, cols, year) {
  if (cols.any === -1) return [];
  const names = [];
  rows.forEach(function (row) {
    if (String(row[cols.any] || '').trim() !== String(year)) return;
    const raw = cols.masia !== -1 ? String(row[cols.masia] || '') : '';
    raw.split(',').forEach(function (part) {
      const name = part.trim();
      if (name && names.indexOf(name) === -1) names.push(name);
    });
  });
  return names;
}

function getMasiaNamesForYearMonth(rows, cols, year, monthIndex) {
  if (cols.any === -1) return [];
  const monthName = normalizeText(MONTH_NAMES_CA[monthIndex]);
  const names = [];
  rows.forEach(function (row) {
    if (String(row[cols.any] || '').trim() !== String(year)) return;
    const mesRaw = String(row[cols.mes] || '').trim();
    if (mesRaw && mesRaw.split(',').map(function (part) { return normalizeText(part).trim(); }).indexOf(monthName) === -1) return;
    const raw = cols.masia !== -1 ? String(row[cols.masia] || '') : '';
    raw.split(',').forEach(function (part) {
      const name = part.trim();
      if (name && names.indexOf(name) === -1) names.push(name);
    });
  });
  return names;
}

function buildPickerCardDots(masiaNames) {
  const dots = document.createElement('span');
  dots.className = 'calendar-picker-card-dots';
  sortMasiaNames(masiaNames).forEach(function (name) {
    const dot = document.createElement('span');
    dot.className = 'calendar-day-dot';
    dot.style.background = getMasiaColor(name);
    dots.appendChild(dot);
  });
  return dots;
}
// Els tres nivells de vista del calendari (anys → mesos → mes concret)
// i el dispatcher renderCalendar() que decideix quin toca mostrar.
function renderCalendarYears() {
  const container = document.getElementById('calendarView');
  container.innerHTML = '';

  const title = document.createElement('h2');
  title.className = 'calendar-title calendar-picker-title';
  title.textContent = 'Tria un any';
  container.appendChild(title);

  const grid = document.createElement('div');
  grid.className = 'calendar-picker-grid calendar-picker-grid-years';

  const cols = getCalendarColIndexes();
  const rows = getCalendarRows();
  const currentYear = new Date().getFullYear();
  [currentYear - 1, currentYear, currentYear + 1].forEach(function (year) {
    const masiaNames = getMasiaNamesForYear(rows, cols, year);
    const card = document.createElement('button');
    card.type = 'button';
    card.className = 'calendar-picker-card' + (year === currentYear ? ' is-current' : '') + (masiaNames.length ? '' : ' is-empty');

    const value = document.createElement('span');
    value.className = 'calendar-picker-card-value';
    value.textContent = String(year);
    card.appendChild(value);
    card.appendChild(masiaNames.length
      ? buildPickerCardDots(masiaNames)
      : Object.assign(document.createElement('span'), { className: 'calendar-picker-card-meta', textContent: 'sense dades' }));

    card.addEventListener('click', function () {
      state.calendarYear = year;
      state.calendarLevel = 'months';
      renderCalendar();
    });
    grid.appendChild(card);
  });

  container.appendChild(grid);
}

function renderCalendarMonths() {
  const container = document.getElementById('calendarView');
  container.innerHTML = '';

  const year = state.calendarYear;
  container.appendChild(buildCalendarBackLink('Anys', function () {
    state.calendarLevel = 'years';
    renderCalendar();
  }));

  const title = document.createElement('h2');
  title.className = 'calendar-title calendar-picker-title';
  title.textContent = String(year);
  container.appendChild(title);

  const grid = document.createElement('div');
  grid.className = 'calendar-picker-grid calendar-picker-grid-months';

  const cols = getCalendarColIndexes();
  const rows = getCalendarRows();
  const today = new Date();
  MONTH_NAMES_CA.forEach(function (name, monthIndex) {
    const masiaNames = getMasiaNamesForYearMonth(rows, cols, year, monthIndex);
    const isCurrent = year === today.getFullYear() && monthIndex === today.getMonth();
    const card = document.createElement('button');
    card.type = 'button';
    card.className = 'calendar-picker-card' + (isCurrent ? ' is-current' : '') + (masiaNames.length ? '' : ' is-empty');

    const value = document.createElement('span');
    value.className = 'calendar-picker-card-value';
    value.textContent = name;
    card.appendChild(value);
    card.appendChild(masiaNames.length
      ? buildPickerCardDots(masiaNames)
      : Object.assign(document.createElement('span'), { className: 'calendar-picker-card-meta', textContent: 'sense dades' }));

    card.addEventListener('click', function () {
      state.calendarRefDate = new Date(year, monthIndex, 1);
      state.calendarLevel = 'month';
      renderCalendar();
    });
    grid.appendChild(card);
  });

  container.appendChild(grid);
}

function renderCalendarMonthGrid() {
  const container = document.getElementById('calendarView');
  container.innerHTML = '';

  const cols = getCalendarColIndexes();
  if (cols.dia === -1 || cols.mes === -1 || cols.any === -1) {
    const msg = document.createElement('p');
    msg.className = 'calendar-empty-msg';
    msg.textContent = 'Aquest full no té les columnes "Dia", "Mes" i "Any" necessàries per calcular el calendari.';
    container.appendChild(msg);
    return;
  }

  const refDate = state.calendarRefDate;
  const year = refDate.getFullYear();
  const month = refDate.getMonth();
  state.calendarYear = year;

  container.appendChild(buildCalendarBackLink(String(year), function () {
    state.calendarLevel = 'months';
    renderCalendar();
  }));
  container.appendChild(buildCalendarHeader(year, month));

  const grid = document.createElement('div');
  grid.className = 'calendar-grid';

  WEEKDAY_HEADER_NAMES_CA.forEach(function (name) {
    const weekdayCell = document.createElement('div');
    weekdayCell.className = 'calendar-weekday';
    weekdayCell.textContent = name;
    grid.appendChild(weekdayCell);
  });

  const firstOfMonth = new Date(year, month, 1);
  const startOffset = (firstOfMonth.getDay() + 6) % 7; // setmana comença en dilluns
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const rows = getCalendarRows();
  const today = new Date();

  for (let i = 0; i < startOffset; i++) {
    const empty = document.createElement('div');
    empty.className = 'calendar-day calendar-day-empty';
    grid.appendChild(empty);
  }

  const monthMasiaNames = [];
  for (let day = 1; day <= daysInMonth; day++) {
    const cellDate = new Date(year, month, day);
    const matches = rows.filter(function (row) { return ruleAppliesToDate(row, cols, cellDate); });
    matches.forEach(function (row) {
      const raw = cols.masia !== -1 ? String(row[cols.masia] || '') : '';
      raw.split(',').forEach(function (part) {
        const name = part.trim();
        if (name && monthMasiaNames.indexOf(name) === -1) monthMasiaNames.push(name);
      });
    });
    const isToday = cellDate.getFullYear() === today.getFullYear()
      && cellDate.getMonth() === today.getMonth()
      && cellDate.getDate() === today.getDate();
    grid.appendChild(buildCalendarDayCell(cellDate, matches, cols, isToday));
  }

  container.appendChild(grid);

  const legend = buildCalendarLegend(monthMasiaNames);
  if (legend) container.appendChild(legend);

  if (!rows.length) {
    const msg = document.createElement('p');
    msg.className = 'calendar-empty-msg';
    msg.textContent = 'Cap fila coincideix amb els filtres seleccionats.';
    container.appendChild(msg);
  }
}
