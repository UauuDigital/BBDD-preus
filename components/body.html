<header class="topbar">
  <h1 class="wordmark">BBDD Preus</h1>
  <span class="eyebrow">UAUU</span>
</header>

<main class="app">
  <nav id="tabs" class="tabs" aria-label="Pestanyes del full"></nav>
  <p id="sheetHint" class="sheet-hint"></p>

  <div class="toolbar">
    <label class="search-field">
      <span id="searchIcon"></span>
      <input id="searchInput" class="search-input" type="search" placeholder="Cerca..." aria-label="Cerca dins d'aquest full" />
    </label>
    <div id="tableFilters" class="table-filters"></div>
    <span class="toolbar-spacer"></span>
    <span id="statusMsg" class="status" role="status" aria-live="polite"></span>
    <button id="addRowBtn" class="btn btn-primary" type="button"></button>
    <button id="refreshBtn" class="btn btn-ghost" type="button" aria-label="Refresca"></button>
  </div>

  <div class="table-wrap">
    <table id="dataTable"></table>
  </div>
</main>

<dialog id="addRowModal" class="modal">
  <form id="addRowForm" method="dialog">
    <div class="modal-header">
      <h2 id="addRowTitle" class="modal-title">Nova fila</h2>
      <p id="addRowStep" class="modal-step"></p>
      <div class="modal-progress" aria-hidden="true">
        <div id="addRowProgressFill" class="modal-progress-fill"></div>
      </div>
    </div>
    <div id="addRowFields" class="modal-fields"></div>
    <div class="modal-actions">
      <button type="button" id="addRowCancelBtn" class="btn btn-ghost">Cancel·la</button>
      <span class="modal-actions-spacer"></span>
      <button type="button" id="addRowBackBtn" class="btn btn-ghost" hidden>Enrere</button>
      <button type="button" id="addRowNextBtn" class="btn btn-primary" hidden>Següent</button>
      <button type="submit" id="addRowSubmitBtn" class="btn btn-primary" hidden>Crea la fila</button>
    </div>
  </form>
</dialog>
